<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KRK - 라벨부터 신고까지, 한 곳에서">
  <title>KRK - 라벨 진단</title>
  
  <!-- Pretendard 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #F0F4F8 0%, #E3EDF7 100%);
      min-height: 100vh;
      padding: 24px;
      color: #1A2B4C;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ==================== 헤더 ==================== */
    .header {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .header-title {
      font-size: 24px;
      font-weight: 700;
      color: #1A2B4C;
    }

    .back-btn {
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid rgba(26, 43, 76, 0.2);
      background: transparent;
      color: #1A2B4C;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(26, 43, 76, 0.05);
    }

    /* ==================== 메인 콘텐츠 ==================== */
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .section {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 24px;
    }

    /* ==================== 폼 요소 ==================== */
    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #7A8FA3;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(26, 43, 76, 0.1);
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      color: #1A2B4C;
      transition: all 0.3s;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #7A8FA3;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #B8D4FF;
      box-shadow: 0 0 0 3px rgba(184, 212, 255, 0.2);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    /* ==================== 진단 결과 ==================== */
    .diagnosis-result {
      background: rgba(184, 212, 255, 0.1);
      border: 1px solid rgba(184, 212, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-top: 24px;
    }

    .result-title {
      font-size: 14px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 16px;
    }

    .result-item {
      padding: 12px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #4A5F7F;
    }

    .result-item.error {
      background: rgba(244, 67, 54, 0.1);
      color: #F44336;
      border-left: 3px solid #F44336;
      padding-left: 12px;
    }

    .result-item.warning {
      background: rgba(255, 152, 0, 0.1);
      color: #F57C00;
      border-left: 3px solid #FF9800;
      padding-left: 12px;
    }

    .result-item.success {
      background: rgba(76, 175, 80, 0.1);
      color: #4CAF50;
      border-left: 3px solid #4CAF50;
      padding-left: 12px;
    }

    /* ==================== 버튼 ==================== */
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.8));
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(26, 43, 76, 1), rgba(26, 43, 76, 0.9));
      box-shadow: 0 8px 20px rgba(26, 43, 76, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.4);
      color: #1A2B4C;
      border: 1px solid rgba(26, 43, 76, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    /* ==================== 정보 메시지 ==================== */
    .info-message {
      background: rgba(33, 150, 243, 0.05);
      border: 1px solid rgba(33, 150, 243, 0.1);
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: #1565C0;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* 반응형 */
    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .button-group {
        flex-direction: column;
      }

      .section {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <h1 class="header-title">🔍 라벨 진단</h1>
      <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="content">
      <!-- 좌측: 입력 폼 -->
      <div class="section">
        <h2 class="section-title">라벨 정보 입력</h2>

        <div class="info-message">
          💡 기존 라벨의 제품명과 표기 사항을 입력하면, AI가 식품 관련 법규 준수 여부를 분석합니다.
        </div>

        <!-- 제품명 -->
        <div class="form-group">
          <label>제품명 *</label>
          <input type="text" id="productName" placeholder="예: 고추장" required>
        </div>

        <!-- 현재 표기 사항 -->
        <div class="form-group">
          <label>현재 표기 사항 *</label>
          <textarea id="labelContent" placeholder="라벨에 표기된 주요 정보 (원재료, 영양정보 등)" required></textarea>
        </div>

        <!-- 추가 정보 -->
        <div class="form-group">
          <label>추가 정보 (선택)</label>
          <textarea id="additionalInfo" placeholder="특별한 사항이나 추가 정보"></textarea>
        </div>

        <!-- 버튼 -->
        <div class="button-group">
          <button class="btn btn-primary" onclick="diagnoseLabel()">🔍 진단 시작</button>
          <button class="btn btn-secondary" onclick="clearForm()">초기화</button>
        </div>
      </div>

      <!-- 우측: 진단 결과 -->
      <div class="section">
        <h2 class="section-title">진단 결과</h2>

        <div id="resultContainer" style="display: none;">
          <div class="diagnosis-result" id="diagnosisResult"></div>
          
          <div style="margin-top: 24px;">
            <h3 style="font-size: 14px; font-weight: 700; color: #1A2B4C; margin-bottom: 12px;">📋 개선 권고사항</h3>
            <div id="recommendations" style="font-size: 13px; color: #4A5F7F; line-height: 1.8;"></div>
          </div>

          <button class="btn btn-primary" onclick="downloadDiagnosisReport()" style="width: 100%; margin-top: 24px;">
            📥 진단 보고서 다운로드
          </button>
        </div>

        <div id="emptyState" style="text-align: center; padding: 40px 20px; color: #7A8FA3;">
          <div style="font-size: 48px; margin-bottom: 12px;">📋</div>
          <p>좌측에서 라벨 정보를 입력하고<br>[🔍 진단 시작]을 클릭하세요.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 라벨 진단
    function diagnoseLabel() {
      const productName = document.getElementById('productName').value;
      const labelContent = document.getElementById('labelContent').value;

      if (!productName || !labelContent) {
        alert('제품명과 표기 사항을 입력해주세요');
        return;
      }

      // AI 진단 (현재는 샘플 데이터)
      const diagnosisResults = [
        {
          type: 'success',
          text: '✓ 제품명이 명확하게 표기되어 있습니다.'
        },
        {
          type: 'warning',
          text: '⚠️ 제조일자 표기가 권장됩니다.'
        },
        {
          type: 'warning',
          text: '⚠️ 원산지 표기 확인 필요합니다.'
        },
        {
          type: 'success',
          text: '✓ 주요 알레르겐 정보가 포함되어 있습니다.'
        }
      ];

      const recommendations = [
        '1. 필수 표기사항: 제품명, 원재료명, 내용량, 원산지, 제조자/수입자',
        '2. 보관 방법 및 유통기한을 명확히 표기하세요',
        '3. 알레르겐 정보는 진하게 표시하는 것을 권장합니다',
        '4. 영양정보는 표준 양식을 따르세요',
        '5. 한글로 명확하게 표기되었는지 확인하세요'
      ];

      // 결과 표시
      const resultContainer = document.getElementById('resultContainer');
      const emptyState = document.getElementById('emptyState');
      const diagnosisResult = document.getElementById('diagnosisResult');
      const recommendationsDiv = document.getElementById('recommendations');

      diagnosisResult.innerHTML = diagnosisResults.map(result => 
        `<div class="result-item ${result.type}">${result.text}</div>`
      ).join('');

      recommendationsDiv.innerHTML = recommendations.map(rec => 
        `<div style="margin-bottom: 8px;">• ${rec}</div>`
      ).join('');

      resultContainer.style.display = 'block';
      emptyState.style.display = 'none';
    }

    // 폼 초기화
    function clearForm() {
      document.getElementById('productName').value = '';
      document.getElementById('labelContent').value = '';
      document.getElementById('additionalInfo').value = '';
      document.getElementById('resultContainer').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
    }

    // 진단 보고서 다운로드
    function downloadDiagnosisReport() {
      const productName = document.getElementById('productName').value;
      const labelContent = document.getElementById('labelContent').value;

      const content = `
KRK 라벨 진단 보고서
====================

제품명: ${productName}
진단일: ${new Date().toLocaleDateString('ko-KR')}

현재 표기 사항:
${labelContent}

진단 결과:
- ✓ 제품명이 명확하게 표기되어 있습니다.
- ⚠️ 제조일자 표기가 권장됩니다.
- ⚠️ 원산지 표기 확인 필요합니다.
- ✓ 주요 알레르겐 정보가 포함되어 있습니다.

개선 권고사항:
1. 필수 표기사항: 제품명, 원재료명, 내용량, 원산지, 제조자/수입자
2. 보관 방법 및 유통기한을 명확히 표기하세요
3. 알레르겐 정보는 진하게 표시하는 것을 권장합니다
4. 영양정보는 표준 양식을 따르세요
5. 한글로 명확하게 표기되었는지 확인하세요

생성: KRK (Kitchen Risk Check)
      `;

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${productName}_진단보고서.txt`;
      link.click();
    }

    // 뒤로가기
    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
