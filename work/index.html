<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work | KRK.TEAM</title>
    <meta name="description" content="KRK의 식품 브랜드 컨설팅 케이스 스터디. 밸런스 비, 미음, 어반퓨어 등 브랜딩 · 패키지 · 캠페인 작업을 소개합니다." />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Work | KRK · Food brand consulting studio" />
    <meta property="og:description" content="KRK의 식품 브랜드 컨설팅 케이스 스터디. 브랜딩 · 패키지 · 캠페인." />
    <meta property="og:image" content="../assets/krk-og.png" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="KRK" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Work | KRK · Food brand consulting studio" />
    <meta name="twitter:description" content="KRK의 식품 브랜드 컨설팅 케이스 스터디. 브랜딩 · 패키지 · 캠페인." />
    <meta name="twitter:image" content="../assets/krk-og.png" />

    <link rel="stylesheet" href="../assets/krk-tokens.css" />
    <style>
      body {
        overflow-x: hidden;
        background: #fff;
        color: var(--ink);
      }

      .topbar-menu.left .topbar-make-label { display: none; }
      .topbar-menu.right { justify-self: end; }
      .topbar-make-label {
        opacity: 1 !important;
        padding: 7px 14px;
        border: 1px solid var(--ink, #1a1816);
        border-radius: 999px;
        font-size: 12px !important;
        letter-spacing: .02em;
        transition: background .18s ease, color .18s ease !important;
      }
      .topbar-make-label:hover {
        background: var(--ink, #1a1816);
        color: #fff !important;
      }

      main {
        width: 100%;
        padding: 56px 28px 72px;
      }

      .work-meta-line {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin: 0 0 72px;
        color: rgba(0,0,0,.48);
        font-family: var(--en);
        font-size: 11px;
        font-weight: 400;
        line-height: 1.45;
        letter-spacing: -.02em;
      }

      .category-bar {
        position: sticky;
        top: 52px;
        z-index: 30;
        display: flex;
        gap: 6px;
        align-items: center;
        justify-content: flex-start;
        margin: 0 -28px 28px;
        padding: 10px 28px;
        background: rgba(255,255,255,.88);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .category-button {
        min-width: 72px;
        border: 1px solid rgba(0,0,0,.14);
        border-radius: 999px;
        padding: 6px 12px;
        color: rgba(0,0,0,.48);
        font-family: var(--en);
        font-size: 11px;
        font-weight: 400;
        transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
      }
      .category-button:hover,
      .category-button.is-active {
        border-color: #000;
        background: #000;
        color: #fff;
      }

      .work-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .work-card {
        display: block;
      }
      .work-card.hidden {
        display: none;
      }

      .work-image {
        position: relative;
        overflow: hidden;
        aspect-ratio: 4 / 3;
        background: #f2f0eb;
      }
      .work-image::after {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 54px;
        background: rgba(255,255,255,.72);
        opacity: 0;
        transform: translateY(-100%);
        transition: opacity 300ms ease, transform 520ms cubic-bezier(.19,1,.22,1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .work-image img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 900ms cubic-bezier(.19,1,.22,1), filter 500ms ease;
      }
      .work-card:hover img {
        transform: scale(1.045);
        filter: saturate(.92) brightness(.94);
      }
      .work-card:hover .work-image::after {
        opacity: 1;
        transform: translateY(0);
      }

      .hover-title {
        position: absolute;
        z-index: 2;
        top: 13px;
        left: 16px;
        max-width: calc(100% - 32px);
        color: #0b0b0b;
        font-family: var(--en);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.15;
        letter-spacing: -.02em;
        text-align: left;
        opacity: 0;
        transform: translateY(-10px);
        transition: opacity 300ms ease, transform 520ms cubic-bezier(.19,1,.22,1);
        pointer-events: none;
      }
      .work-card:hover .hover-title {
        opacity: 1;
        transform: translateY(0);
      }

      .work-meta {
        display: none;
      }

      .bottom-logo {
        overflow: hidden;
        padding: 90px 0 18px;
      }
      .bottom-logo img {
        display: block;
        width: min(70vw, 760px);
        height: auto;
        margin: 0 auto;
      }
      .bottom-info {
        display: flex;
        justify-content: space-between;
        padding-top: 26px;
        font-family: var(--en);
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
      }
      .bottom-info a {
        color: inherit;
      }

      @media (max-width: 900px) {
        .work-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .topbar {
          display: flex;
          justify-content: space-between;
          gap: 16px;
          padding: 18px var(--pad-x);
        }
        .topbar-logo {
          position: absolute;
          top: 19px;
          right: var(--pad-x);
          z-index: 2;
          display: inline-flex !important;
          visibility: visible !important;
        }
        .topbar-logo img {
          display: block !important;
          height: 20px !important;
          width: auto !important;
          opacity: 1 !important;
        }
        .topbar-menu.left {
          gap: 16px;
          min-width: 0;
        }
        .topbar-menu.right { display: none; }
        .topbar-menu.left .topbar-make-label {
          display: inline-flex;
          padding: 6px 12px;
          font-size: 11px !important;
        }

        main {
          padding: 126px 18px 54px;
        }
        .work-meta-line {
          margin-bottom: 36px;
          justify-content: flex-start;
          text-align: left;
        }
        .category-bar {
          top: 86px;
          justify-content: flex-start;
          overflow-x: auto;
          margin: 0 -18px 32px;
          padding: 12px 18px;
          scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar {
          display: none;
        }
        .category-button {
          flex: 0 0 auto;
        }
        .work-grid {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .bottom-logo img {
          width: min(84vw, 430px);
        }
        .bottom-info {
          display: grid;
          gap: 10px;
          justify-items: center;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar is-light">
      <nav class="topbar-menu left">
        <a href="../service.html">Service</a>
        <a class="is-active" href="index.html">Work</a>
        <a class="topbar-make-label" href="https://checker.krk.team" target="_blank" rel="noopener">Make Label</a>
      </nav>
      <a class="topbar-logo" href="../index.html" aria-label="KRK home">
        <img src="../assets/krk-logo.svg" alt="KRK" />
      </a>
      <nav class="topbar-menu right">
        <a class="topbar-make-label" href="https://checker.krk.team" target="_blank" rel="noopener">Make Label</a>
      </nav>
    </header>

    <main>
      <div class="work-meta-line">
        <span>3 Projects</span>
        <span>|</span>
        <span>KRK가 설계한 식품 브랜드 운영 사례를 카테고리별로 확인하세요.</span>
      </div>

      <nav class="category-bar" aria-label="Work categories">
        <button class="category-button is-active" type="button" data-category="All">All</button>
        <button class="category-button" type="button" data-category="Branding">Branding</button>
        <button class="category-button" type="button" data-category="Campaign">Campaign</button>
      </nav>

      <section class="work-grid" id="workGrid">
        <a class="work-card" href="case_balanceb.html" data-category="Branding">
          <div class="work-image">
            <span class="hover-title">Balance B</span>
            <img src="../assets/index-balanceb.png" alt="Balance B" />
          </div>
          <div class="work-meta"><span>Balance B</span><span>Branding</span></div>
        </a>
        <a class="work-card" href="case_mium.html" data-category="Branding">
          <div class="work-image">
            <span class="hover-title">Mium</span>
            <img src="../assets/index-mium.png" alt="Mium" loading="lazy" />
          </div>
          <div class="work-meta"><span>Mium</span><span>Branding</span></div>
        </a>
        <a class="work-card" href="case_urbanpure.html" data-category="Campaign">
          <div class="work-image">
            <span class="hover-title">UrbanPure</span>
            <img src="../assets/index-urbanpure.png" alt="UrbanPure" loading="lazy" />
          </div>
          <div class="work-meta"><span>UrbanPure</span><span>Campaign</span></div>
        </a>
      </section>

      <footer class="bottom-logo">
        <img src="../assets/krk-logo.svg" alt="KRK" />
        <div class="bottom-info">
          <span>©KRK. All rights reserved.</span>
          <a href="mailto:contact@krk.team">contact@krk.team</a>
        </div>
      </footer>
    </main>

    <script>
      const buttons = Array.from(document.querySelectorAll('.category-button'));
      const cards = Array.from(document.querySelectorAll('.work-card'));
      const topbar = document.querySelector('.topbar');

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          const category = button.dataset.category;
          buttons.forEach((item) => item.classList.toggle('is-active', item === button));
          cards.forEach((card) => {
            const show = category === 'All' || card.dataset.category === category;
            card.classList.toggle('hidden', !show);
          });
        });
      });

      const syncTopbar = () => {
        if (!topbar) return;
        topbar.classList.toggle('scrolled', window.scrollY > 8);
      };
      syncTopbar();
      window.addEventListener('scroll', syncTopbar, { passive: true });
    </script>
    <script src="../consult-widget.js" defer></script>
  </body>
</html>
