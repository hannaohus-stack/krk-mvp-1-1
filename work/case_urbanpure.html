<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Detail | KRK.TEAM</title>
    <link rel="stylesheet" href="../assets/krk-tokens.css" />
    <style>
      :root {
        --bg:      #f4f1ea;
        --paper:   #faf7f0;
        --paper-2: #ece7dc;
        --ink:     #1a1816;
        --ink-2:   #4a443c;
        --ink-3:   #8a8275;
        --line:    rgba(26,24,22,.12);
        --line-soft: rgba(26,24,22,.06);
        --accent:  #b89968;
      }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        color: var(--ink);
      }
      ::selection { background: var(--ink); color: var(--paper); }

      /* ===========================================================
         TOPBAR
         =========================================================== */
      .topbar {
        position: fixed;
        z-index: 70;
        top: 0; left: 0; right: 0;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 18px var(--pad-x);
        background: rgba(20,17,15,.14);
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        color: rgba(255,255,255,.9);
        font-family: var(--en);
        font-size: 13px;
        letter-spacing: .02em;
      }
      .topbar-menu {
        display: flex;
        align-items: center;
        gap: 26px;
        font-weight: 520;
      }
      .topbar-menu.left { justify-self: start; }
      .topbar-menu.right { justify-self: end; }
      .topbar-menu a { color: rgba(255,255,255,.72); transition: color .18s ease; }
      .topbar-menu a:hover, .topbar-menu a.is-active { color: #fff; }
      .topbar-logo {
        justify-self: center;
        display: inline-flex;
        align-items: center;
        height: 28px;
      }
      .topbar-logo img {
        height: 24px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      .fade-in {
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      .fade-in.visible { opacity: 1; }

      .container {
        width: 100%;
        max-width: var(--max);
        margin: 0 auto;
        padding: 0 var(--pad-x);
      }
      section { position: relative; }

      /* ===========================================================
         01 — HERO
         =========================================================== */
      .hero {
        position: relative;
        height: 100svh;
        min-height: 600px;
        color: #fff;
        overflow: hidden;
        background: #2a2622;
      }
      .hero-media {
        position: absolute !important;
        inset: 0 !important;
        height: 100% !important;
        min-height: 0 !important;
        background: transparent !important;
        overflow: visible !important;
      }
      .hero-media img,
      .hero-media video {
        position: absolute !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,.5) 100%);
      }
      .hero-inner {
        position: relative;
        z-index: 2;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 0 var(--pad-x) 64px;
        max-width: var(--max);
        margin: 0 auto;
      }
      .hero-kicker {
        margin: 0 0 18px;
        color: rgba(255,255,255,.72);
        font-family: var(--en);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .22em;
        text-transform: uppercase;
      }
      .hero-title {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(60px, 10vw, 168px);
        font-weight: 300;
        line-height: .92;
        letter-spacing: -.025em;
        color: #fff;
        max-width: 14ch;
      }

      /* ===========================================================
         02 — PROJECT OVERVIEW
         =========================================================== */
      .overview {
        padding: 140px 0;
      }
      .overview-grid {
        display: grid;
        grid-template-columns: 5fr 7fr;
        gap: 80px;
        align-items: start;
      }
      .meta-list {
        display: flex;
        flex-direction: column;
      }
      .meta-item {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 20px;
        padding: 18px 0;
        border-bottom: 1px solid var(--line-soft);
      }
      .meta-item:first-child { border-top: 1px solid var(--line-soft); }
      .meta-label {
        font-family: var(--en);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: var(--ink-3);
        padding-top: 3px;
      }
      .meta-value {
        font-size: 14px;
        line-height: 1.55;
        color: var(--ink);
      }
      .overview-lead {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 300;
        font-size: clamp(24px, 2.6vw, 36px);
        line-height: 1.3;
        letter-spacing: -.015em;
        color: var(--ink);
        margin: 0;
      }

      /* ===========================================================
         03 — VISUAL CAROUSEL
         =========================================================== */
      .visual-section {
        padding: 0 0 140px;
      }
      .section-head {
        max-width: var(--max);
        margin: 0 auto 60px;
        padding: 0 var(--pad-x);
        display: grid;
        grid-template-columns: 5fr 7fr;
        gap: 80px;
        align-items: end;
      }
      .eyebrow {
        font-family: var(--en);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: var(--ink-3);
        margin: 0;
      }
      .section-title {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 300;
        font-size: 25px;
        line-height: 1.4;
        letter-spacing: -.01em;
        color: var(--ink);
        margin: 16px 0 0;
        max-width: 28ch;
      }

      .carousel-frame {
        position: relative;
        overflow: hidden;
      }
      .carousel-track {
        display: flex;
        gap: 24px;
        padding: 0 var(--pad-x);
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }
      .carousel-track::-webkit-scrollbar { display: none; }
      .carousel-slide {
        flex: 0 0 auto;
        width: clamp(280px, 32vw, 440px);
        aspect-ratio: 4 / 5;
        scroll-snap-align: center;
        overflow: hidden;
        background: var(--paper-2);
        border-radius: 4px;
      }
      .carousel-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* ===========================================================
         04 — CHANNEL: Web (top, large) + IG/Text (bottom split)
         =========================================================== */
      .channel-section {
        padding: 140px 0;
        background: var(--paper);
      }
      .channel-inner {
        max-width: var(--max);
        margin: 0 auto;
        padding: 0 var(--pad-x);
        display: flex;
        flex-direction: column;
        gap: 64px;
      }

      /* Web Landing — top, large, 16:10 */
      .channel-web {
        width: 100%;
      }
      .channel-block .ch-label {
        font-family: var(--en);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: var(--ink-3);
        margin: 0 0 16px;
      }

      .channel-copy {
        max-width: 42ch;
      }
      .channel-copy .eyebrow {
        margin: 0 0 16px;
      }
      .channel-copy .section-title {
        margin: 0;
      }
      /* IG feed — centered, 2x */
      .channel-ig {
        width: clamp(520px, 56vw, 640px);
        margin: 0 auto;
      }

      .ig-frame {
        background: #fff;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 1px 0 var(--line-soft);
      }
      .ig-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line-soft);
      }
      .ig-avatar {
        width: 30px; height: 30px;
        border-radius: 50%;
        background: linear-gradient(135deg, #c89e6b, #f4d8a8);
      }
      .ig-handle {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
      }
      .ig-feed {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
      }
      .ig-cell {
        aspect-ratio: 1;
        overflow: hidden;
        background: var(--paper-2);
      }
      .ig-cell img {
        width: 100%; height: 100%; object-fit: cover;
      }

      .web-frame {
        background: #fff;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(26,24,22,.08);
      }
      .web-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line-soft);
        background: #f6f3ec;
      }
      .web-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #d8d3c8;
      }
      .web-body {
        aspect-ratio: 16 / 10;
        overflow: hidden;
        position: relative;
      }
      .web-body img {
        width: 100%; height: 100%; object-fit: cover;
      }
      .web-caption {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 32px;
        color: #fff;
        background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,.55) 100%);
      }
      .web-caption h4 {
        margin: 0 0 6px;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 300;
        font-size: clamp(20px, 2.2vw, 30px);
        line-height: 1.2;
      }
      .web-caption p {
        margin: 0;
        font-size: 13px;
        opacity: .85;
      }

      /* ===========================================================
         05 — WORKFLOW
         =========================================================== */
      .workflow {
        padding: 140px 0;
      }
      .workflow-grid {
        display: grid;
        grid-template-columns: 5fr 7fr;
        gap: 80px;
        align-items: center;
      }
      .wf-title {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 300;
        font-size: clamp(36px, 5vw, 72px);
        line-height: 1.04;
        letter-spacing: -.02em;
        color: var(--ink);
        margin: 16px 0 32px;
      }
      .wf-lead {
        font-size: 15px;
        line-height: 1.7;
        color: var(--ink-2);
        max-width: 42ch;
        margin: 0 0 40px;
      }
      .wf-subhead {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
        margin: 0 0 18px;
      }
      .wf-checks {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .wf-checks li {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 14px;
        align-items: start;
        font-size: 15px;
        line-height: 1.5;
        color: var(--ink);
      }
      .wf-check {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px; height: 22px;
        background: var(--ink);
        color: #fff;
        border-radius: 4px;
        font-size: 12px;
      }

      .wf-visual {
        position: relative;
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 28px;
        align-items: center;
      }
      .wf-anchor {
        background: #fff;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 28px rgba(26,24,22,.06);
        aspect-ratio: 3 / 4;
        overflow: hidden;
      }
      .wf-anchor img {
        width: 100%; height: 100%; object-fit: cover; border-radius: 6px;
      }
      .wf-refgrid {
        background: #fff;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 28px rgba(26,24,22,.06);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .wf-refgrid > div {
        aspect-ratio: 1;
        overflow: hidden;
        background: var(--paper-2);
        border-radius: 4px;
      }
      .wf-refgrid img {
        width: 100%; height: 100%; object-fit: cover;
      }

      /* ===========================================================
         FOOTER
         =========================================================== */
      .bottom-logo {
        display: grid;
        place-items: center;
        padding: 84px var(--pad-x) 70px;
        text-align: center;
        background: var(--paper);
      }
      .bottom-logo img {
        width: min(52vw, 350px);
        height: auto;
        margin-bottom: 24px;
      }
      .bottom-info {
        display: grid;
        gap: 2px;
        color: var(--ink);
        font-family: var(--en);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: .02em;
        text-transform: uppercase;
      }
      .bottom-info a:hover { color: var(--accent); }

      /* ===========================================================
         RESPONSIVE
         =========================================================== */
      @media (max-width: 1080px) {
        .overview-grid,
        .section-head,
        .workflow-grid { grid-template-columns: 1fr; gap: 40px; }
        .channel-ig { width: 100%; max-width: 480px; }
        .wf-visual { grid-template-columns: 120px 1fr; }
      }
      @media (max-width: 760px) {
        .overview, .channel-section, .workflow, .visual-section { padding: 80px 0; }
        .channel-inner { gap: 48px; }
        .hero-inner { padding-top: 104px; padding-bottom: 40px; }
        .hero-title { max-width: 10ch; }
        .carousel-slide { width: 65vw; }
        .channel-ig {
          width: 100%;
          max-width: none;
          justify-self: stretch;
        }
        .web-caption { padding: 20px; }
        .wf-visual { grid-template-columns: 1fr; gap: 20px; }
        .wf-anchor { max-width: 200px; aspect-ratio: 4 / 3; }
      }
    </style>
  </head>
  <body>
    <!-- TOPBAR -->
    <header class="topbar">
      <nav class="topbar-menu left">
        <a href="../service-v2.html">Service</a>
        <a class="is-active" href="index.html">Work</a>
        <a class="make-label-btn make-label-mobile" href="https://checker.krk.team/" target="_blank">Make Label</a>
      </nav>
      <a class="topbar-logo" href="../index.html" aria-label="KRK home">
        <img src="../assets/krk-logo.svg" alt="KRK" />
      </a>
      <div class="topbar-right"><a class="make-label-btn" href="https://checker.krk.team/" target="_blank">Make Label</a></div>
    </header>

    <main>
      <!-- 01 HERO -->
      <section class="hero">
        <div class="hero-media">
          <img id="heroImage" src="" alt="" />
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-inner">
          <h1 class="hero-title" id="heroTitle"></h1>
        </div>
      </section>

      <!-- 02 PROJECT OVERVIEW -->
      <section class="overview">
        <div class="container">
          <div class="overview-grid">
            <div class="meta-list" id="metaList"></div>
            <p class="overview-lead" id="overviewLead"></p>
          </div>
        </div>
      </section>

      <!-- 03 VISUAL CAROUSEL -->
      <section class="visual-section">
        <div class="section-head">
          <div class="fade-in">
            <h2 class="section-title" id="visualTitle"></h2>
          </div>
        </div>
        <div class="carousel-frame">
          <div class="carousel-track" id="carouselTrack"></div>
        </div>
      </section>

      <!-- 04 CHANNEL: Title (top) + Web (middle) + IG (bottom, centered) -->
      <section class="channel-section">
        <div class="channel-inner">
          <!-- Title (top) -->
          <div class="channel-copy fade-in">
            <h2 class="section-title">Web Landing &amp; SNS</h2>
          </div>

          <!-- Web Landing (middle, large) -->
          <div class="channel-web channel-block fade-in">
            <p class="ch-label">Web Landing</p>
            <div class="web-frame">
              <div class="web-bar">
                <span class="web-dot"></span>
                <span class="web-dot"></span>
                <span class="web-dot"></span>
              </div>
              <div class="web-body">
                <img id="webImage" src="" alt="" />
                <div class="web-caption">
                  <h4 id="webHeadline"></h4>
                  <p id="webSub"></p>
                </div>
              </div>
            </div>
          </div>

          <!-- Instagram Feed (bottom, centered, 2x) -->
          <div class="channel-ig channel-block fade-in">
            <p class="ch-label">Instagram Feed</p>
            <div class="ig-frame">
              <div class="ig-bar">
                <div class="ig-avatar"></div>
                <div class="ig-handle" id="igHandle"></div>
              </div>
              <div class="ig-feed" id="igFeed"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 05 WORKFLOW -->
      <section class="workflow">
        <div class="container">
          <div class="workflow-grid">
            <div class="fade-in">
              <p class="eyebrow">— Workflow</p>
              <h2 class="wf-title" id="wfTitle"></h2>
              <p class="wf-lead" id="wfLead"></p>
              <p class="wf-subhead">How we make it:</p>
              <ul class="wf-checks" id="wfChecks"></ul>
            </div>
            <div class="wf-visual fade-in">
              <div class="wf-anchor">
                <img id="wfAnchor" src="" alt="anchor product" />
              </div>
              <div class="wf-refgrid" id="wfRefGrid"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="bottom-logo" id="contact">
      <img src="../assets/krk-logo.svg" alt="KRK" />
      <div class="bottom-info">
        <span>©KRK. All rights reserved.</span>
        <a href="mailto:contact@krk.team">contact@krk.team</a>
      </div>
    </footer>

    <script>
      const cases = [{
        id: "urbanpure",
        name: "UrbanPure",
        en: "UrbanPure",
        slogan: "Small rituals. Real results.<br>UrbanPure",
        category: "Inner Beauty",
        period: "2026",
        scope: "Brand Positioning · Package · Campaign Visual · AI Brand OS",
        overviewLead: "이너뷰티 시장은 클렌즈와 디톡스의 언어로 가득합니다.<br>UrbanPure는 그 언어를 쓰지 않습니다.<br>세 가지 색, 세 개의 아침 — 어제와 오늘 사이를 매듭짓는 브랜드입니다.",
        visualTitle: "Brand Campaign",
        wfTitle: "From one anchor to a full campaign.",
        wfLead: "한 장의 기준 이미지에서 캠페인 시리즈, 패키지 비주얼, SNS 소재까지 같은 톤으로 확장합니다.",
        wfChecks: [
          "Anchor product shot as visual reference",
          "AI-generated campaign series with consistent tone",
          "Package, lifestyle, and feed cuts from one brief"
        ],
        webHeadline: "Three colors. One ritual.",
        webSub: "JINLEMON · OLITOMA · PEARAJI",
        heroImage: "../assets/up-jl-m-01.png",
        slides: [
          "../assets/up-jl-p-02.png",
          "../assets/up-jl-p-03.png",
          "../assets/up-ot-p-01.png",
          "../assets/up-pj-p-01.png",
          "../assets/up-all-p-01.png"
        ],
        igGrid: [
          "../assets/up-jl-m-01.png",
          "../assets/up-jl-m-02.png",
          "../assets/up-jl-m-03.png",
          "../assets/up-ot-m-01.png",
          "../assets/up-jl-i-02.png",
          "../assets/up-jl-i-03.png",
          "../assets/up-ot-i-03.png",
          "../assets/up-jl-p-03.png",
          "../assets/up-all-p-01.png"
        ],
        webImage: "",
        wfAnchor: "../assets/up-all-p-01.png",
        wfRefs: [
          "../assets/up-jl-a-01.png",
          "../assets/up-ot-a-01.png",
          "../assets/up-pj-a-01.png",
          "../assets/up-jl-p-03.png"
        ]
      }];

      const params = new URLSearchParams(window.location.search);
      const current = cases.find(c => c.id === params.get('case')) || cases[0];

      const $ = id => document.getElementById(id);
      const setText = (id, v) => { const el = $(id); if (el) el.textContent = v || ''; };
      const setHTML = (id, v) => { const el = $(id); if (el) el.innerHTML = v || ''; };
      const setImg = (id, src, alt) => { const el = $(id); if (!el) return; el.src = src || ''; el.alt = alt || ''; };

      document.title = current.en + ' | KRK Work Detail';

      // 01 Hero
      setHTML('heroTitle', current.slogan);
      $('heroTitle')?.classList.add('visible');
      setImg('heroImage', current.heroImage, current.name);

      // 02 Overview
      setHTML('overviewLead', current.overviewLead);
      setHTML('metaList', [
        ['Client', current.name],
        ['Category', current.category],
        ['Period', current.period],
        ['Scope', current.scope]
      ].map(([k, v]) =>
        `<div class="meta-item"><span class="meta-label">${k}</span><span class="meta-value">${v}</span></div>`
      ).join(''));

      // 03 Visual carousel
      setText('visualTitle', current.visualTitle);
      setHTML('carouselTrack', current.slides.map((src, i) =>
        `<div class="carousel-slide"><img src="${src}" alt="${current.name} ${i + 1}" /></div>`
      ).join(''));

      // 04 Channel
      setText('igHandle', '@' + current.id);
      setHTML('igFeed', current.igGrid.slice(0, 9).map(src =>
        `<div class="ig-cell"><img src="${src}" alt="" /></div>`
      ).join(''));
      setImg('webImage', current.webImage, '');
      setText('webHeadline', current.webHeadline);
      setText('webSub', current.webSub);

      // 05 Workflow
      setText('wfTitle', current.wfTitle);
      setText('wfLead', current.wfLead);
      setHTML('wfChecks', current.wfChecks.map(c =>
        `<li><span class="wf-check">✓</span><span>${c}</span></li>`
      ).join(''));
      setImg('wfAnchor', current.wfAnchor, '');
      setHTML('wfRefGrid', current.wfRefs.slice(0, 6).map(src =>
        `<div><img src="${src}" alt="" /></div>`
      ).join(''));

      // Quiet motion
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.05 });
      document.querySelectorAll('.fade-in').forEach(el => io.observe(el));

      // Auto-scroll carousel
      (function () {
        const track = $('carouselTrack');
        if (!track) return;
        const slides = track.querySelectorAll('.carousel-slide');
        if (slides.length < 2) return;
        let i = 0;
        setInterval(() => {
          i = (i + 1) % slides.length;
          track.scrollTo({ left: slides[i].offsetLeft - 24, behavior: 'smooth' });
        }, 4000);
      })();
    </script>
    <script src="../consult-widget.js" defer></script>
  </body>
</html>
