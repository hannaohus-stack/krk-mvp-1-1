<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>krk.team OCR Upload Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0A0A0B',
            heritage: { 500: '#002D72', 600: '#00245B', 700: '#001D49' },
            breath: { 50: '#EAF7FF', 400: '#39B9FF', 500: '#0CA4F9', 600: '#087EC0', 700: '#075E8E' },
            sys: { 100: '#F7F8FA', 200: '#E8EAEE' },
          },
          fontFamily: {
            kr: ['Pretendard', 'system-ui', 'sans-serif'],
            en: ['Inter', 'Pretendard', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; color: #0A0A0B; background: #fff; font-family: Pretendard, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::selection { background: #0CA4F9; color: #fff; }
    .btn-primary, .btn-heritage, .btn-ghost { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 20px; font: 500 13px Inter, Pretendard, sans-serif; border-radius: 0; transition: 150ms; }
    .btn-primary { background: #0CA4F9; color: #fff; border: 0; }
    .btn-primary:hover { background: #087EC0; }
    .btn-heritage { background: #002D72; color: #fff; border: 0; }
    .btn-heritage:hover { background: #00245B; }
    .btn-ghost { background: transparent; color: #0A0A0B; border: 1px solid #0A0A0B; }
    .btn-ghost:hover { background: #0A0A0B; color: #fff; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .input-field { height: 40px; width: 100%; border: 1px solid rgba(10,10,11,.22); padding: 0 14px; font: 13px Pretendard, system-ui, sans-serif; outline: none; background: #fff; border-radius: 0; }
    .input-field:focus { border-color: #0CA4F9; box-shadow: 0 0 0 3px rgba(12,164,249,.15); }
    .badge-ok, .badge-warn, .badge-neutral { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 10px; font: 500 11px Inter, Pretendard, sans-serif; letter-spacing: .04em; white-space: nowrap; }
    .badge-ok { background: #EAF7FF; color: #00245B; }
    .badge-warn { background: #FFF3DC; color: #8A5A00; }
    .badge-neutral { background: #F7F8FA; color: rgba(10,10,11,.65); }
    @keyframes loading-bar { 0% { transform: translateX(-100%); width: 40%; } 50% { width: 60%; } 100% { transform: translateX(350%); width: 40%; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
    @media (max-width: 700px) {
      .ingredient-grid { grid-template-columns: 1fr 74px 62px 62px 28px !important; }
      .step-label { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useRef, useState } = React

    const STEP_LABELS = ['사진 업로드', '원재료 확인', '제품 정보 입력']
    const INGREDIENTS = [
      '정제수','정제소금','정제설탕','백설탕','흑설탕','황설탕','밀가루','강력밀가루','박력밀가루','중력밀가루','보리가루','옥수수전분','감자전분',
      '계란','계란노른자','달걀흰자','전란액','건조란','우유','저지방우유','탈지우유','전지분유','탈지분유','무염버터','가염버터','마가린','쇼트닝',
      '식용유','대두유','카놀라유','해바라기유','올리브유','팜유','건포도','썬드라이토마토','딸기잼','딸기','블루베리','사과','바나나','소금','설탕',
      '꿀','올리고당','고과당옥수수시럽','포도당','과당','효모','베이킹파우더','탄산수소나트륨','주석산수소칼륨','바닐라향료','바닐라에센스','바닐라빈',
      '카카오분말','초콜릿칩','다크초콜릿','화이트초콜릿','아몬드분말','아몬드슬라이스','호두분쇄','땅콩분쇄','레몬즙','레몬제스트','오렌지즙',
      '생크림','휘핑크림','사워크림','크림치즈','설탕시럽','전화당','물엿','식초','사과식초','현미식초','간장','된장','고추장','참기름','들기름',
      '고춧가루','마늘분말','생강분말','후추분말','MSG','핵산조미료','효모추출물','구연산','젖산','사과산','레시틴','대두레시틴','해바라기레시틴'
    ]
    const ALLERGENS = ['우유','계란','땅콩','대두','밀','고등어','게','새우','돼지고기','복숭아','토마토','아황산류','메타중아황산류','호두','조개류','헤이즐넛','아몬드','캐슈넛','피스타치오','참깨','겨자','셀러리','파프리카','참치','굴','쇠고기','닭고기']
    const COMPOSITES = ['된장','고추장','쌈장','간장','청국장','막장','케첩','마요네즈','드레싱','소스','잼','마멀레이드','주스','스프','치즈','요거트','버터','크림','분말스프','시즈닝','양념','빵가루','크루통','시리얼','초콜릿','가나슈','크림치즈','햄','소시지','베이컨']
    const MOCK = `정제밀가루 350\n정제설탕 120\n무염버터 100\n계란 80\n우유 60\n베이킹파우더 8\n소금 4\n바닐라향료 2\n아몬드슬라이스 15`
    const STORAGE_OPTIONS = ['실온 보관 (1~35℃)','냉장 보관 (0~10℃)','냉동 보관 (-18℃ 이하)','서늘하고 건조한 곳 보관']

    function uid() {
      return (crypto.randomUUID && crypto.randomUUID()) || `${Date.now()}-${Math.random()}`
    }

    function similarity(a, b) {
      const aa = a.replace(/\s/g, '').toLowerCase()
      const bb = b.replace(/\s/g, '').toLowerCase()
      if (aa === bb) return 1
      if (aa.includes(bb) || bb.includes(aa)) return .9
      let matches = 0
      for (const ch of aa) if (bb.includes(ch)) matches++
      return matches / Math.max(aa.length, bb.length, 1)
    }

    function findNearestMatch(name) {
      let best = INGREDIENTS[0], bestScore = 0
      for (const candidate of INGREDIENTS) {
        const score = similarity(name, candidate)
        if (score > bestScore) { best = candidate; bestScore = score }
      }
      return { name: best, confidence: bestScore }
    }

    function checkAllergen(name) {
      const normalized = name.replace(/\s/g, '').toLowerCase()
      return ALLERGENS.some(item => normalized.includes(item.replace(/\s/g, '').toLowerCase()))
    }

    function checkComposite(name) {
      return COMPOSITES.some(item => name.includes(item))
    }

    function parseOcrText(text) {
      return text.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
        const match = line.match(/^(.+?)\s+([\d.]+)\s*g?$/) || line.match(/^(.+?)[\s|]+\s*([\d.]+)/)
        if (!match) return null
        const rawName = match[1].trim()
        const weight = parseFloat(match[2])
        const matched = findNearestMatch(rawName)
        const name = matched.confidence > .75 ? matched.name : rawName
        return {
          id: uid(),
          name,
          rawName,
          weight,
          suggestedName: matched.name,
          isComposite: checkComposite(rawName) || checkComposite(matched.name),
          isAllergen: checkAllergen(rawName) || checkAllergen(matched.name),
          matchConfidence: matched.confidence,
        }
      }).filter(Boolean).sort((a, b) => b.weight - a.weight)
    }

    function calculateRatios(items) {
      const total = items.reduce((sum, item) => sum + item.weight, 0)
      return items.map(item => ({ ...item, percentage: total ? ((item.weight / total) * 100).toFixed(2) : '0.00' }))
    }

    function Icon({ children, className = '' }) {
      return <span aria-hidden="true" className={`inline-flex items-center justify-center ${className}`}>{children}</span>
    }

    function StepIndicator({ current }) {
      return <div className="flex items-center gap-0 font-en text-[11px] tracking-[0.12em] uppercase">
        {STEP_LABELS.map((label, i) => <div key={label} className="flex items-center">
          <div className={`flex items-center gap-2 ${i < current ? 'text-breath-500' : i === current ? 'text-ink' : 'text-black/30'}`}>
            <span className={`w-5 h-5 flex items-center justify-center text-[10px] font-semibold border ${i < current ? 'bg-breath-500 border-breath-500 text-white' : i === current ? 'bg-ink border-ink text-white' : 'border-black/20 text-black/30'}`}>{i < current ? '✓' : i + 1}</span>
            <span className="step-label">{label}</span>
          </div>
          {i < STEP_LABELS.length - 1 && <span className="mx-4 text-black/20">-</span>}
        </div>)}
      </div>
    }

    function CompositeWarningModal({ items, onClose }) {
      return <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div className="bg-white w-full max-w-md mx-4 border border-black/10">
          <div className="flex items-center justify-between px-6 py-4 border-b border-black/10">
            <div className="flex items-center gap-2"><span className="text-[#8A5A00]">!</span><span className="font-en font-semibold text-[13px]">복합원재료 감지</span></div>
            <button onClick={onClose} className="text-black/40 hover:text-ink">×</button>
          </div>
          <div className="px-6 py-5">
            <p className="font-kr text-[13px] text-black/65 leading-[1.65] mb-4">아래 원재료는 <strong className="text-ink font-semibold">복합원재료</strong>로 감지되었습니다. 배합비율이 <strong className="text-[#8A5A00]">5% 이상</strong>인 경우, 세부 구성 원재료를 반드시 표시해야 합니다.</p>
            <div className="flex flex-col gap-2 mb-5">
              {items.map(item => <div key={item.id} className="flex items-center justify-between px-4 py-3 bg-[#FFF8EC] border-l-[3px] border-[#F0A500]">
                <div><span className="font-en font-semibold text-[13px]">{item.name}</span><span className="ml-3 font-en text-[11px] text-black/45">{item.weight}g</span></div>
                <span className="badge-warn">세부 확인 필요</span>
              </div>)}
            </div>
            <div className="bg-sys-100 px-4 py-3 text-[12px] font-kr text-black/55 leading-[1.6]">v1에서는 경고 표시만 제공합니다. 세부 원재료 자동 분해는 v2에서 지원 예정입니다.</div>
          </div>
          <div className="px-6 pb-5"><button onClick={onClose} className="btn-primary w-full justify-center">확인했습니다</button></div>
        </div>
      </div>
    }

    function AutocompleteInput({ value, onChange }) {
      const [open, setOpen] = useState(false)
      const [query, setQuery] = useState(value)
      const suggestions = query.length >= 1 ? INGREDIENTS.filter(i => i.includes(query) || query.includes(i.slice(0, 2))).slice(0, 6) : []
      return <div className="relative w-full">
        <input type="text" value={query} className="input-field pr-8 text-[12px]" onChange={e => { setQuery(e.target.value); onChange(e.target.value); setOpen(true) }} onFocus={() => setOpen(true)} onBlur={() => setTimeout(() => setOpen(false), 140)} />
        {open && suggestions.length > 0 && <div className="absolute top-full left-0 right-0 z-20 bg-white border border-black/10 shadow-lg mt-px max-h-44 overflow-y-auto">
          {suggestions.map(s => <button key={s} type="button" onMouseDown={() => { setQuery(s); onChange(s); setOpen(false) }} className="w-full text-left px-3 py-2 font-kr text-[12px] hover:bg-breath-50 transition-colors flex items-center justify-between">
            <span>{s}</span>{s === findNearestMatch(query).name && <span className="text-[10px] text-breath-600 font-en">추천</span>}
          </button>)}
        </div>}
      </div>
    }

    function UploadStep({ onFile }) {
      const [drag, setDrag] = useState(false)
      const inputRef = useRef(null)
      const pick = file => file && onFile(file)
      return <div className="flex flex-col gap-8">
        <div className="border-l-[3px] border-breath-500 pl-4">
          <p className="font-kr text-[15px] text-ink leading-[1.7]">거래명세서, 원재료 포장지, 배합표 사진을 업로드해주세요.</p>
          <p className="font-kr text-[13px] text-black/50 mt-1">AI가 원재료 목록을 자동으로 추출합니다. - 약 3초 소요</p>
        </div>
        <div onClick={() => inputRef.current.click()} onDragOver={e => { e.preventDefault(); setDrag(true) }} onDragLeave={() => setDrag(false)} onDrop={e => { e.preventDefault(); setDrag(false); pick(e.dataTransfer.files[0]) }} className={`relative flex flex-col items-center justify-center gap-5 border-2 border-dashed cursor-pointer select-none transition-all duration-200 py-20 px-8 ${drag ? 'border-breath-500 bg-breath-50' : 'border-black/20 bg-sys-100 hover:border-breath-400 hover:bg-breath-50/50'}`}>
          <input ref={inputRef} type="file" accept="image/*,.heic" className="hidden" onChange={e => pick(e.target.files[0])} />
          <div className={`w-14 h-14 flex items-center justify-center border transition-colors text-2xl ${drag ? 'border-breath-500 bg-breath-500 text-white' : 'border-black/20 bg-white text-black/40'}`}>{drag ? '↑' : '□'}</div>
          <div className="text-center">
            <p className="font-en font-semibold text-[14px] text-ink">{drag ? '놓으면 분석 시작' : '파일을 드래그하거나 클릭하여 선택'}</p>
            <p className="font-en text-[12px] text-black/40 mt-1">JPG · PNG · WEBP · HEIC</p>
          </div>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          {[['거래명세서','납품 거래명세서 사진','01'],['원재료 포장지','원재료 포장지 뒷면','02'],['배합표','자체 제작 배합비율표','03']].map(tip => <div key={tip[0]} className="bg-sys-100 px-4 py-4 flex flex-col gap-2">
            <span className="font-en text-[11px] text-breath-600">{tip[2]}</span><span className="font-en font-semibold text-[12px] text-ink">{tip[0]}</span><span className="font-kr text-[11px] text-black/50">{tip[1]}</span>
          </div>)}
        </div>
      </div>
    }

    function AnalyzingStep({ previewUrl }) {
      return <div className="flex flex-col items-center gap-8 py-16">
        {previewUrl && <div className="relative"><img src={previewUrl} alt="업로드된 이미지" className="max-h-48 max-w-xs object-contain border border-black/10" /><div className="absolute inset-0 bg-white/60 flex items-center justify-center"><div className="spinner text-3xl text-breath-500">○</div></div></div>}
        <div className="text-center"><p className="font-kr text-[16px] text-ink font-medium">원재료 분석 중...</p><p className="font-en text-[12px] text-black/40 mt-1 tracking-[0.08em] uppercase">Mock Vision AI · 식약처 DB 매칭</p></div>
        <div className="w-64 h-[2px] bg-sys-200 overflow-hidden"><div className="h-full bg-breath-500" style={{ animation: 'loading-bar 1.5s ease-in-out infinite' }} /></div>
      </div>
    }

    function ReviewStep({ ingredients, onChange, onConfirm, onReset }) {
      const withRatios = calculateRatios(ingredients)
      const composites = ingredients.filter(i => i.isComposite)
      const allergens = ingredients.filter(i => i.isAllergen)
      const [showCompositeModal, setShowCompositeModal] = useState(composites.length > 0)
      const updateField = (id, field, value) => {
        const updated = ingredients.map(item => {
          if (item.id !== id) return item
          const next = { ...item, [field]: value }
          if (field === 'name') {
            const match = findNearestMatch(value)
            next.suggestedName = match.name
            next.matchConfidence = match.confidence
            next.isAllergen = checkAllergen(value)
            next.isComposite = checkComposite(value)
          }
          return next
        })
        onChange(updated.sort((a, b) => b.weight - a.weight))
      }
      const addRow = () => onChange([...ingredients, { id: uid(), name: '', rawName: '', weight: 0, suggestedName: '', isComposite: false, isAllergen: false, matchConfidence: 0 }])
      return <>
        {showCompositeModal && composites.length > 0 && <CompositeWarningModal items={composites} onClose={() => setShowCompositeModal(false)} />}
        <div className="flex flex-col gap-6">
          <div className="grid grid-cols-3 gap-3">
            <SummaryCard value={ingredients.length} label="원재료 추출" />
            <SummaryCard value={allergens.length} label="알레르기 감지" warn={allergens.length > 0} />
            <SummaryCard value={composites.length} label="복합원재료" warn={composites.length > 0} />
          </div>
          <p className="font-kr text-[13px] text-black/55 leading-[1.7]">AI가 추출한 원재료를 확인하세요. 잘못된 항목은 직접 수정할 수 있습니다. 원료명 입력 시 식약처 공식 명칭을 자동 추천합니다.</p>
          <div className="border border-black/10 overflow-visible">
            <div className="ingredient-grid grid bg-sys-100 border-b border-black/10" style={{ gridTemplateColumns: '1fr 100px 80px 80px 32px' }}>{['원재료명','중량(g)','비율','구분',''].map(h => <div key={h} className="px-3 py-2.5 font-en text-[11px] font-semibold text-black/45 uppercase tracking-[0.08em]">{h}</div>)}</div>
            {withRatios.map((item, idx) => <div key={item.id} className={`ingredient-grid grid items-center border-b border-black/5 last:border-0 ${item.isAllergen ? 'bg-[#FFFBF0]' : item.isComposite ? 'bg-[#FFFCF5]' : idx % 2 === 0 ? 'bg-white' : 'bg-black/[.01]'}`} style={{ gridTemplateColumns: '1fr 100px 80px 80px 32px' }}>
              <div className="px-3 py-2"><AutocompleteInput value={item.name} onChange={v => updateField(item.id, 'name', v)} />{item.rawName && item.rawName !== item.name && <div className="text-[10px] text-black/35 font-en mt-0.5 truncate">OCR: {item.rawName}</div>}</div>
              <div className="px-3 py-2"><input type="number" value={item.weight || ''} min="0" step="0.1" className="input-field text-[12px] text-right" onChange={e => updateField(item.id, 'weight', parseFloat(e.target.value) || 0)} /></div>
              <div className="px-3 py-2 font-en text-[12px] text-black/55 text-right">{item.percentage}%</div>
              <div className="px-2 py-2 flex items-center justify-center">{item.isAllergen ? <span className="badge-warn text-[9px] px-1.5">알레르기</span> : item.isComposite ? <span className="badge-neutral text-[9px] px-1.5">복합</span> : <span className="badge-ok text-[9px] px-1.5">확인</span>}</div>
              <div className="px-1 py-2 flex items-center justify-center"><button onClick={() => onChange(ingredients.filter(i => i.id !== item.id))} className="w-5 h-5 flex items-center justify-center text-black/25 hover:text-[#B30000]">×</button></div>
            </div>)}
            <button onClick={addRow} className="w-full px-3 py-2.5 font-en text-[12px] text-black/40 hover:text-breath-600 hover:bg-breath-50 transition-colors text-left border-t border-black/5">+ 원재료 추가</button>
          </div>
          {allergens.length > 0 && <div className="flex items-start gap-3 bg-[#FFF8EC] border border-[#F0D080] px-4 py-3"><span className="text-[#8A5A00] mt-0.5">!</span><div><p className="font-en font-semibold text-[12px] text-[#8A5A00]">알레르기 유발물질 {allergens.length}개 감지</p><p className="font-kr text-[12px] text-[#8A5A00]/80 mt-0.5">{allergens.map(a => a.name).join(', ')} - 라벨에 반드시 표시해야 합니다.</p></div></div>}
          <div className="flex items-center justify-between pt-2"><button onClick={onReset} className="btn-ghost">↻ 다시 업로드</button><button onClick={onConfirm} disabled={ingredients.length === 0 || ingredients.some(i => !i.name || i.weight <= 0)} className="btn-primary">이 원재료로 확정 ›</button></div>
        </div>
      </>
    }

    function SummaryCard({ value, label, warn }) {
      return <div className={`border-l-[3px] px-4 py-3 ${warn ? 'bg-[#FFF3DC] border-[#F0A500]' : 'bg-breath-50 border-breath-500'}`}>
        <div className={`font-en font-semibold text-[24px] tracking-[-0.02em] ${warn ? 'text-[#8A5A00]' : 'text-heritage-700'}`}>{value}</div>
        <div className={`font-en text-[11px] uppercase tracking-[0.06em] ${warn ? 'text-[#8A5A00]' : 'text-breath-700'}`}>{label}</div>
      </div>
    }

    function MetadataStep({ metadata, onChange, onConfirm, onBack }) {
      const set = key => e => onChange({ ...metadata, [key]: e.target.value })
      const valid = metadata.productName.trim() && metadata.totalWeight.trim() && metadata.expiryDays.trim() && metadata.manufacturer.trim()
      return <div className="flex flex-col gap-6">
        <p className="font-kr text-[13px] text-black/55 leading-[1.7]">라벨과 품목제조보고서에 들어갈 제품 기본 정보를 입력해주세요.</p>
        <div className="grid grid-cols-1 gap-5 md:grid-cols-2">
          <Field className="md:col-span-2" label="제품명" required><input className="input-field" placeholder="예: 크리스피 씨솔트 아몬드" value={metadata.productName} onChange={set('productName')} /></Field>
          <Field label="내용량" required><div className="flex gap-2"><input className="input-field flex-1" type="number" placeholder="200" value={metadata.totalWeight} onChange={set('totalWeight')} /><select className="input-field w-20" value={metadata.unit} onChange={set('unit')}><option>g</option><option>mL</option><option>kg</option><option>L</option></select></div></Field>
          <Field label="소비기한 (일 기준)" required><div className="flex items-center gap-2"><input className="input-field flex-1" type="number" placeholder="180" value={metadata.expiryDays} onChange={set('expiryDays')} /><span className="font-en text-[12px] text-black/40">일</span></div></Field>
          <Field label="보관방법"><select className="input-field" value={metadata.storage} onChange={set('storage')}>{STORAGE_OPTIONS.map(opt => <option key={opt}>{opt}</option>)}</select></Field>
          <Field label="제조업소명" required><input className="input-field" placeholder="예: 홍길동 베이커리" value={metadata.manufacturer} onChange={set('manufacturer')} /></Field>
        </div>
        <div className="flex items-center justify-between pt-2"><button onClick={onBack} className="btn-ghost">← 원재료 수정</button><button onClick={onConfirm} disabled={!valid} className="btn-heritage">법규 검토 시작 ›</button></div>
      </div>
    }

    function Field({ label, required, className = '', children }) {
      return <div className={`flex flex-col gap-1.5 ${className}`}><label className="font-en text-[11px] font-semibold text-black/45 uppercase tracking-[0.08em]">{label} {required && <span className="text-[#B30000]">*</span>}</label>{children}</div>
    }

    function App() {
      const [status, setStatus] = useState('idle')
      const [step, setStep] = useState(0)
      const [previewUrl, setPreviewUrl] = useState(null)
      const [ingredients, setIngredients] = useState([])
      const [metadata, setMetadata] = useState({ productName: '', totalWeight: '', unit: 'g', expiryDays: '', storage: STORAGE_OPTIONS[0], manufacturer: '' })
      const currentStep = step === 0 ? 0 : step === 1 ? 1 : 2
      const handleFile = file => {
        setPreviewUrl(URL.createObjectURL(file))
        setStatus('analyzing')
        setTimeout(() => {
          setIngredients(parseOcrText(MOCK))
          setStatus('done')
          setStep(1)
        }, 1400)
      }
      const reset = () => { setStatus('idle'); setStep(0); setPreviewUrl(null); setIngredients([]) }
      return <div className="min-h-screen bg-white">
        <nav className="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-6 md:px-16 py-[18px] bg-white/80 backdrop-blur-[18px] border-b border-black/10">
          <div className="font-en font-extrabold tracking-[0.18em] text-[14px]">krk<span className="text-breath-500">.</span>team</div>
          <div className="hidden sm:block"><StepIndicator current={currentStep} /></div>
          <div className="font-en text-[11px] text-black/35 tracking-[0.08em]">HTML PREVIEW</div>
        </nav>
        <main className="pt-[72px] min-h-screen flex flex-col">
          <div className="flex-1 max-w-[760px] mx-auto w-full px-6 md:px-0 py-12 md:py-16">
            <div className="mb-10 pb-5 border-b border-black/10">
              <div className="font-en text-[11px] font-semibold text-black/35 uppercase tracking-[0.16em] mb-2">{['01 - 원재료 입력','02 - 원재료 확인','03 - 제품 정보'][currentStep]}</div>
              <h1 className="font-en font-medium text-[clamp(24px,3.5vw,36px)] leading-[1.1]">{currentStep === 0 ? <>사진 한 장으로<br />원재료를 자동 입력하세요.</> : currentStep === 1 ? <>추출된 원재료를<br />확인·수정해주세요.</> : <>제품 기본 정보를<br />입력해주세요.</>}</h1>
            </div>
            {status === 'analyzing' ? <AnalyzingStep previewUrl={previewUrl} /> : step === 0 ? <UploadStep onFile={handleFile} /> : step === 1 ? <ReviewStep ingredients={ingredients} onChange={setIngredients} onConfirm={() => setStep(2)} onReset={reset} /> : <MetadataStep metadata={metadata} onChange={setMetadata} onConfirm={() => alert('검토 완료. 법규 검토 단계로 이동합니다.')} onBack={() => setStep(1)} />}
          </div>
          <footer className="border-t border-black/5 px-6 py-5 text-center"><p className="font-en text-[11px] text-black/30 leading-[1.6]">krk.team이 제공하는 검토 결과 및 과태료 금액은 참고용 정보이며, 법적 효력이 없습니다. 정확한 법규 해석은 관할 지자체 또는 식약처에 문의하세요.</p></footer>
        </main>
      </div>
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
