<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KRK - 라벨부터 신고까지, 한 곳에서">
  <title>KRK - 라벨 진단</title>
  
  <!-- Pretendard 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #F0F4F8 0%, #E3EDF7 100%);
      min-height: 100vh;
      padding: 24px;
      color: #1A2B4C;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ==================== 헤더 ==================== */
    .header {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .header-title {
      font-size: 24px;
      font-weight: 700;
      color: #1A2B4C;
    }

    .back-btn {
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid rgba(26, 43, 76, 0.2);
      background: transparent;
      color: #1A2B4C;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(26, 43, 76, 0.05);
    }

    /* ==================== 메인 콘텐츠 ==================== */
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .section {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 24px;
    }

    /* ==================== 사진 업로드 ==================== */
    .upload-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-message {
      background: rgba(33, 150, 243, 0.05);
      border: 1px solid rgba(33, 150, 243, 0.1);
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: #1565C0;
      line-height: 1.6;
    }

    .upload-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .upload-btn {
      flex: 1;
      min-width: 150px;
      padding: 16px 24px;
      border-radius: 12px;
      border: 1px solid rgba(26, 43, 76, 0.2);
      background: rgba(255, 255, 255, 0.4);
      color: #1A2B4C;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .upload-btn:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    .upload-btn.primary {
      background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.8));
      color: white;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .upload-btn.primary:hover {
      background: linear-gradient(135deg, rgba(26, 43, 76, 1), rgba(26, 43, 76, 0.9));
    }

    .file-input {
      display: none;
    }

    /* ==================== 이미지 미리보기 ==================== */
    .preview-area {
      background: rgba(184, 212, 255, 0.1);
      border: 2px dashed rgba(184, 212, 255, 0.3);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-area.has-image {
      border-style: solid;
      padding: 0;
      overflow: hidden;
    }

    #labelImage {
      max-width: 100%;
      max-height: 400px;
      border-radius: 16px;
    }

    .empty-state {
      color: #7A8FA3;
      text-align: center;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* ==================== 진단 결과 ==================== */
    .diagnosis-result {
      background: rgba(184, 212, 255, 0.1);
      border: 1px solid rgba(184, 212, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .result-title {
      font-size: 14px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 16px;
    }

    .result-item {
      padding: 12px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #4A5F7F;
    }

    .result-item.error {
      background: rgba(244, 67, 54, 0.1);
      color: #F44336;
      border-left: 3px solid #F44336;
      padding-left: 12px;
    }

    .result-item.warning {
      background: rgba(255, 152, 0, 0.1);
      color: #F57C00;
      border-left: 3px solid #FF9800;
      padding-left: 12px;
    }

    .result-item.success {
      background: rgba(76, 175, 80, 0.1);
      color: #4CAF50;
      border-left: 3px solid #4CAF50;
      padding-left: 12px;
    }

    /* ==================== 버튼 ==================== */
    .button-group {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.8));
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(26, 43, 76, 1), rgba(26, 43, 76, 0.9));
      box-shadow: 0 8px 20px rgba(26, 43, 76, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.4);
      color: #1A2B4C;
      border: 1px solid rgba(26, 43, 76, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    /* 반응형 */
    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 16px;
      }

      .upload-buttons {
        flex-direction: column;
      }

      .upload-btn {
        width: 100%;
      }

      .button-group {
        flex-direction: column;
      }

      .section {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <h1 class="header-title">🔍 라벨 진단</h1>
      <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="content">
      <!-- 좌측: 사진 촬영/업로드 -->
      <div class="section">
        <h2 class="section-title">라벨 사진 촬영 또는 업로드</h2>

        <div class="info-message">
          📸 제품 라벨의 사진을 촬영하거나 업로드하면, AI가 표기 사항을 분석합니다.
        </div>

        <div class="upload-area">
          <!-- 촬영/업로드 버튼 -->
          <div class="upload-buttons">
            <button class="upload-btn primary" onclick="triggerCamera()">
              📷 카메라로 촬영
            </button>
            <button class="upload-btn" onclick="triggerFileUpload()">
              🖼️ 사진 업로드
            </button>
          </div>

          <!-- 숨겨진 입력 필드 -->
          <input type="file" id="cameraInput" class="file-input" accept="image/*" capture="environment">
          <input type="file" id="fileInput" class="file-input" accept="image/*">

          <!-- 이미지 미리보기 -->
          <div class="preview-area" id="previewArea">
            <div class="empty-state">
              <div class="empty-icon">📷</div>
              <p>카메라로 촬영하거나<br>사진을 업로드해주세요</p>
            </div>
          </div>

          <!-- 업로드한 이미지 정보 -->
          <div id="imageInfo" style="display: none; font-size: 12px; color: #7A8FA3;">
            <p id="fileName"></p>
            <p id="fileSize"></p>
          </div>
        </div>
      </div>

      <!-- 우측: 진단 결과 -->
      <div class="section">
        <h2 class="section-title">진단 결과</h2>

        <div id="resultContainer" style="display: none;">
          <div class="diagnosis-result" id="diagnosisResult"></div>
          
          <div>
            <h3 style="font-size: 14px; font-weight: 700; color: #1A2B4C; margin-bottom: 12px;">📋 분석된 정보</h3>
            <div id="detectedInfo" style="font-size: 13px; color: #4A5F7F; line-height: 1.8;"></div>
          </div>

          <div style="margin-top: 24px;">
            <h3 style="font-size: 14px; font-weight: 700; color: #1A2B4C; margin-bottom: 12px;">✅ 개선 권고사항</h3>
            <div id="recommendations" style="font-size: 13px; color: #4A5F7F; line-height: 1.8;"></div>
          </div>

          <button class="btn btn-primary" onclick="downloadDiagnosisReport()" style="width: 100%; margin-top: 24px;">
            📥 진단 보고서 다운로드
          </button>
        </div>

        <div id="emptyState" style="text-align: center; padding: 40px 20px; color: #7A8FA3;">
          <div style="font-size: 48px; margin-bottom: 12px;">📋</div>
          <p>좌측에서 라벨 사진을 촬영하거나<br>업로드한 후 [🔍 진단 분석]을 클릭하세요.</p>
        </div>
      </div>
    </div>

    <!-- 진단 버튼 (전체 너비) -->
    <div style="text-align: center;">
      <button class="btn btn-primary" onclick="analyzeLabel()" id="analyzeBtn" style="display: none; width: 100%; max-width: 400px; padding: 16px 32px;">
        🔍 진단 분석 시작
      </button>
    </div>
  </div>

  <script>
    let selectedImage = null;

    // 카메라로 촬영
    function triggerCamera() {
      const cameraInput = document.getElementById('cameraInput');
      cameraInput.click();
    }

    // 파일 업로드
    function triggerFileUpload() {
      const fileInput = document.getElementById('fileInput');
      fileInput.click();
    }

    // 카메라 입력 처리
    document.getElementById('cameraInput').addEventListener('change', (e) => {
      handleImageUpload(e);
    });

    // 파일 입력 처리
    document.getElementById('fileInput').addEventListener('change', (e) => {
      handleImageUpload(e);
    });

    // 이미지 업로드 처리
    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        selectedImage = event.target.result;
        
        // 미리보기 표시
        const previewArea = document.getElementById('previewArea');
        previewArea.classList.add('has-image');
        previewArea.innerHTML = `<img id="labelImage" src="${selectedImage}" alt="라벨 사진">`;

        // 파일 정보 표시
        const fileSize = (file.size / 1024).toFixed(2);
        document.getElementById('fileName').textContent = `파일명: ${file.name}`;
        document.getElementById('fileSize').textContent = `파일 크기: ${fileSize} KB`;
        document.getElementById('imageInfo').style.display = 'block';

        // 분석 버튼 표시
        document.getElementById('analyzeBtn').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    // 라벨 분석
    function analyzeLabel() {
      if (!selectedImage) {
        alert('사진을 먼저 촬영하거나 업로드해주세요');
        return;
      }

      // AI 분석 결과 (현재는 샘플 데이터)
      const diagnosisResults = [
        {
          type: 'success',
          text: '✓ 제품명이 명확하게 표기되어 있습니다.'
        },
        {
          type: 'warning',
          text: '⚠️ 제조일자 표기가 권장됩니다.'
        },
        {
          type: 'warning',
          text: '⚠️ 원산지 표기 확인 필요합니다.'
        },
        {
          type: 'success',
          text: '✓ 주요 알레르겐 정보가 포함되어 있습니다.'
        },
        {
          type: 'success',
          text: '✓ 유통기한이 명확하게 표기되어 있습니다.'
        }
      ];

      const detectedInfo = [
        '• 제품명: 고추장',
        '• 원재료: 고춧가루, 소금, 물',
        '• 내용량: 500g',
        '• 유통기한: 2025-12-31',
        '• 제조자: 테스트 회사'
      ];

      const recommendations = [
        '1. 필수 표기사항 완비: 제품명, 원재료명, 내용량, 원산지, 제조자/수입자 ✓',
        '2. 보관 방법 및 보관 온도 표기를 추가하세요',
        '3. 알레르겐 정보는 더 진하게 표시하는 것을 권장합니다',
        '4. 영양정보 표시를 표준 양식에 맞게 정렬하세요',
        '5. 식품의약품안전처 신고번호를 확인하세요'
      ];

      // 결과 표시
      const resultContainer = document.getElementById('resultContainer');
      const emptyState = document.getElementById('emptyState');
      const diagnosisResult = document.getElementById('diagnosisResult');
      const detectedInfoDiv = document.getElementById('detectedInfo');
      const recommendationsDiv = document.getElementById('recommendations');

      diagnosisResult.innerHTML = diagnosisResults.map(result => 
        `<div class="result-item ${result.type}">${result.text}</div>`
      ).join('');

      detectedInfoDiv.innerHTML = detectedInfo.map(info => 
        `<div style="margin-bottom: 8px;">${info}</div>`
      ).join('');

      recommendationsDiv.innerHTML = recommendations.map(rec => 
        `<div style="margin-bottom: 8px;">${rec}</div>`
      ).join('');

      resultContainer.style.display = 'block';
      emptyState.style.display = 'none';

      // 진단 결과 저장
      const diagnosisData = {
        date: new Date().toLocaleDateString('ko-KR'),
        type: '라벨진단'
      };
      let recentWorks = JSON.parse(localStorage.getItem('krk_recent_works') || '[]');
      recentWorks.unshift(diagnosisData);
      if (recentWorks.length > 10) recentWorks.pop();
      localStorage.setItem('krk_recent_works', JSON.stringify(recentWorks));

      // 사용 횟수 감소
      const user = JSON.parse(localStorage.getItem('krk_user') || '{}');
      if (!user.isPremium && user.usageRemaining > 0) {
        user.usageRemaining--;
        localStorage.setItem('krk_user', JSON.stringify(user));
      }
    }

    // 진단 보고서 다운로드
    function downloadDiagnosisReport() {
      const content = `
KRK 라벨 진단 보고서
====================

진단일: ${new Date().toLocaleDateString('ko-KR')}

분석 결과:
- ✓ 제품명이 명확하게 표기되어 있습니다.
- ⚠️ 제조일자 표기가 권장됩니다.
- ⚠️ 원산지 표기 확인 필요합니다.
- ✓ 주요 알레르겐 정보가 포함되어 있습니다.
- ✓ 유통기한이 명확하게 표기되어 있습니다.

분석된 정보:
• 제품명: 고추장
• 원재료: 고춧가루, 소금, 물
• 내용량: 500g
• 유통기한: 2025-12-31
• 제조자: 테스트 회사

개선 권고사항:
1. 필수 표기사항 완비: 제품명, 원재료명, 내용량, 원산지, 제조자/수입자 ✓
2. 보관 방법 및 보관 온도 표기를 추가하세요
3. 알레르겐 정보는 더 진하게 표시하는 것을 권장합니다
4. 영양정보 표시를 표준 양식에 맞게 정렬하세요
5. 식품의약품안전처 신고번호를 확인하세요

생성: KRK (Kitchen Risk Check)
      `;

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `라벨진단_보고서_${new Date().getTime()}.txt`;
      link.click();
    }

    // 뒤로가기
    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
