<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KRK - 라벨부터 신고까지, 한 곳에서">
  <title>KRK - 회원가입</title>
  
  <!-- Pretendard 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 디자인 시스템 -->
  <link rel="stylesheet" href="css/krkk-design-system.css">
  
  <style>
    /* KRK 커스터마이징 */
    :root {
      --krk-primary: #1A2B4C;
      --krk-accent: #B8D4FF;
      --krk-bg: #F0F4F8;
    }

    body {
      background: linear-gradient(135deg, #F0F4F8 0%, #E3EDF7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--spacing-md);
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--spacing-3xl);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .logo-img {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
    }

    .logo-placeholder {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .logo-text {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-dark);
      letter-spacing: 2px;
    }

    .auth-header h1 {
      font-size: var(--font-size-lg);
      margin-bottom: var(--spacing-sm);
      color: var(--color-text-dark);
    }

    .auth-subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-light);
      margin: 0;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--radius-xl);
      padding: var(--spacing-2xl);
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .form-group {
      margin-bottom: var(--spacing-xl);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--spacing-sm);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-dark);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(26, 43, 76, 0.15);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      font-family: var(--font-primary);
      font-size: var(--font-size-base);
      color: var(--color-text-dark);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input::placeholder {
      color: var(--color-text-lighter);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--krk-accent);
      box-shadow: 0 0 0 3px rgba(184, 212, 255, 0.2);
    }

    .form-hint {
      font-size: var(--font-size-xs);
      color: var(--color-text-lighter);
      margin-top: var(--spacing-xs);
      margin-bottom: 0;
    }

    .error-message {
      display: none;
      font-size: var(--font-size-xs);
      color: var(--color-error);
      margin-top: var(--spacing-xs);
    }

    .error-message.show {
      display: block;
    }

    .checkbox-group {
      margin-bottom: var(--spacing-xl);
      padding: var(--spacing-md) 0;
    }

    .checkbox-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: var(--spacing-md);
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: var(--spacing-sm);
      margin-top: 4px;
      cursor: pointer;
      accent-color: var(--krk-accent);
      flex-shrink: 0;
    }

    .checkbox-item label {
      flex: 1;
      font-size: var(--font-size-sm);
      color: var(--color-text-light);
      cursor: pointer;
      margin: 0;
    }

    .checkbox-item input[type="checkbox"]:focus + label {
      color: var(--color-text-dark);
    }

    .btn-submit {
      width: 100%;
      padding: 16px 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.8));
      color: white;
      font-family: var(--font-primary);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: var(--spacing-lg);
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, rgba(26, 43, 76, 1), rgba(26, 43, 76, 0.9));
      box-shadow: 0 8px 20px rgba(26, 43, 76, 0.2);
      transform: translateY(-2px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--spacing-lg);
      font-size: var(--font-size-sm);
      color: var(--color-text-light);
    }

    .auth-footer a {
      color: var(--krk-accent);
      font-weight: var(--font-weight-semibold);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .auth-footer a:hover {
      color: var(--color-text-dark);
      text-decoration: underline;
    }

    /* 성공 메시지 */
    .success-message {
      display: none;
      padding: var(--spacing-md);
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: var(--radius-sm);
      color: var(--color-success);
      font-size: var(--font-size-sm);
      margin-bottom: var(--spacing-lg);
      animation: slideDown 0.3s ease;
    }

    .success-message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 로딩 상태 */
    .btn-submit.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-submit.loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    /* 반응형 */
    @media (max-width: 640px) {
      .auth-container {
        padding: 0 var(--spacing-md);
      }

      .auth-card {
        padding: var(--spacing-xl);
      }

      .auth-header h1 {
        font-size: var(--font-size-lg);
      }

      .logo-img {
        width: 40px;
        height: 40px;
      }

      .logo-text {
        font-size: var(--font-size-xl);
      }

      .form-group {
        margin-bottom: var(--spacing-lg);
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- 헤더 -->
    <div class="auth-header">
      <div class="logo-container">
        <!-- <img src="assets/logo.png" alt="KRK" class="logo-img"> -->
        <div class="logo-placeholder">🍳</div>
        <span class="logo-text">KRK</span>
      </div>
      <h1>회원가입</h1>
      <p class="auth-subtitle">라벨부터 신고까지, 한 곳에서</p>
    </div>

    <!-- 폼 -->
    <div class="auth-card">
      <div class="success-message" id="successMessage">
        ✓ 가입이 완료되었습니다! 로그인 페이지로 이동합니다...
      </div>

      <form id="signupForm">
        <!-- 이메일 -->
        <div class="form-group">
          <label for="email">이메일 *</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="info@example.com"
            required
          >
          <span class="error-message" id="emailError"></span>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label for="password">비밀번호 *</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="••••••••"
            required
          >
          <p class="form-hint">8자 이상, 숫자 + 특수문자 권장</p>
          <span class="error-message" id="passwordError"></span>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label for="confirmPassword">비밀번호 확인 *</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword"
            placeholder="••••••••"
            required
          >
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <!-- 회사명 -->
        <div class="form-group">
          <label for="company">회사명 *</label>
          <input 
            type="text" 
            id="company" 
            name="company"
            placeholder="홍길동 식품"
            required
          >
          <span class="error-message" id="companyError"></span>
        </div>

        <!-- 약관 동의 -->
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">이용약관에 동의합니다 *</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="privacy" name="privacy" required>
            <label for="privacy">개인정보 처리방침에 동의합니다 *</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="marketing" name="marketing">
            <label for="marketing">마케팅 이메일 수신 (선택)</label>
          </div>
        </div>

        <!-- 제출 버튼 -->
        <button type="submit" class="btn-submit" id="submitBtn">가입하기</button>
      </form>

      <!-- 로그인 링크 -->
      <div class="auth-footer">
        이미 계정이 있으신가요? <a href="login.html">로그인</a>
      </div>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMessage = document.getElementById('successMessage');

    // 유효성 검사
    const validators = {
      email: (value) => {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(value) ? null : '유효한 이메일을 입력하세요';
      },
      password: (value) => {
        if (value.length < 8) return '비밀번호는 8자 이상이어야 합니다';
        if (!/\d/.test(value)) return '숫자를 포함해주세요';
        return null;
      },
      confirmPassword: (value) => {
        const password = document.getElementById('password').value;
        return value === password ? null : '비밀번호가 일치하지 않습니다';
      },
      company: (value) => {
        return value.trim().length >= 2 ? null : '회사명은 2자 이상이어야 합니다';
      }
    };

    // 에러 메시지 표시
    function showError(fieldName, message) {
      const errorEl = document.getElementById(`${fieldName}Error`);
      if (message) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      } else {
        errorEl.classList.remove('show');
        errorEl.textContent = '';
      }
    }

    // 필드 검증
    function validateField(fieldName) {
      const field = document.getElementById(fieldName);
      const validator = validators[fieldName];
      
      if (validator) {
        const error = validator(field.value);
        showError(fieldName, error);
        return !error;
      }
      return true;
    }

    // 실시간 검증
    Object.keys(validators).forEach(fieldName => {
      const field = document.getElementById(fieldName);
      if (field) {
        field.addEventListener('blur', () => validateField(fieldName));
        field.addEventListener('input', () => {
          if (document.getElementById(`${fieldName}Error`).classList.contains('show')) {
            validateField(fieldName);
          }
        });
      }
    });

    // 약관 검증
    function validateCheckboxes() {
      const terms = document.getElementById('terms').checked;
      const privacy = document.getElementById('privacy').checked;
      
      if (!terms || !privacy) {
        alert('필수 약관에 동의해주세요');
        return false;
      }
      return true;
    }

    // 폼 제출
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // 모든 필드 검증
      const isEmailValid = validateField('email');
      const isPasswordValid = validateField('password');
      const isConfirmPasswordValid = validateField('confirmPassword');
      const isCompanyValid = validateField('company');
      const isCheckboxValid = validateCheckboxes();

      if (!isEmailValid || !isPasswordValid || !isConfirmPasswordValid || !isCompanyValid || !isCheckboxValid) {
        return;
      }

      // 제출 상태
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        // localStorage에 데이터 저장 (MVP)
        const userData = {
          id: 'user_' + Date.now(),
          email: document.getElementById('email').value,
          company: document.getElementById('company').value,
          marketing: document.getElementById('marketing').checked,
          createdAt: new Date().toISOString(),
          isPremium: false,
          usageQuota: 3,
          usageRemaining: 3
        };

        localStorage.setItem('krk_user', JSON.stringify(userData));
        localStorage.setItem('krk_password_' + userData.id, document.getElementById('password').value);
        localStorage.setItem('krk_session', userData.id);

        // 성공 메시지 표시
        successMessage.classList.add('show');

        // 2초 후 로그인 페이지로 이동
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (error) {
        alert('가입 중 오류가 발생했습니다: ' + error.message);
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
