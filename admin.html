<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KRK - 관리자 대시보드">
  <title>KRK - 관리자 대시보드</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #F0F4F8 0%, #E3EDF7 100%);
      min-height: 100vh;
      padding: 24px;
      color: #1A2B4C;
      letter-spacing: 0.3px;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-page.hidden {
      display: none;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.12);
    }

    .login-title {
      font-size: 28px;
      font-weight: 800;
      color: #1A2B4C;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-subtitle {
      font-size: 14px;
      color: #7A8FA3;
      text-align: center;
      margin-bottom: 32px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-form input {
      padding: 12px 16px;
      border: 1px solid rgba(184, 212, 255, 0.4);
      border-radius: 12px;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.6);
      color: #1A2B4C;
      transition: all 0.3s;
    }

    .login-form input:focus {
      outline: none;
      border-color: #2196F3;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
    }

    .login-form button {
      padding: 12px 24px;
      background: linear-gradient(135deg, rgba(26, 43, 76, 0.95), rgba(26, 43, 76, 0.85));
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .login-form button:hover {
      background: linear-gradient(135deg, rgba(26, 43, 76, 1), rgba(26, 43, 76, 0.95));
      box-shadow: 0 8px 20px rgba(26, 43, 76, 0.25);
    }

    .login-error {
      padding: 12px;
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: 8px;
      color: #F44336;
      font-size: 12px;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .login-tip {
      font-size: 11px;
      color: #7A8FA3;
      text-align: center;
      margin-top: 16px;
      padding: 12px;
      background: rgba(184, 212, 255, 0.08);
      border-radius: 8px;
    }

    .dashboard-page {
      display: block;
    }

    .dashboard-page.hidden {
      display: none;
    }

    .header {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 24px;
      padding: 20px 32px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.12);
    }

    .header-title {
      font-size: 20px;
      font-weight: 800;
      color: #1A2B4C;
    }

    .header-admin-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-badge {
      font-size: 12px;
      color: #7A8FA3;
      padding: 6px 12px;
      background: rgba(184, 212, 255, 0.15);
      border: 1px solid rgba(184, 212, 255, 0.3);
      border-radius: 6px;
    }

    .btn-logout {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.4);
      color: #1A2B4C;
      border: 1px solid rgba(26, 43, 76, 0.15);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.12);
    }

    .stat-label {
      font-size: 12px;
      color: #7A8FA3;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      color: #1A2B4C;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .stat-unit {
      font-size: 13px;
      color: #4A5F7F;
      font-weight: 500;
    }

    .stat-change {
      font-size: 11px;
      color: #4CAF50;
      margin-top: 8px;
    }

    .table-section {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.12);
    }

    .table-title {
      font-size: 16px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 20px;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(184, 212, 255, 0.08);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #7A8FA3;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(26, 43, 76, 0.08);
    }

    td {
      padding: 14px 16px;
      font-size: 13px;
      color: #4A5F7F;
      border-bottom: 1px solid rgba(26, 43, 76, 0.05);
    }

    tbody tr:hover {
      background: rgba(184, 212, 255, 0.05);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .badge.active {
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .badge.free {
      background: rgba(184, 212, 255, 0.15);
      color: #2196F3;
      border: 1px solid rgba(184, 212, 255, 0.3);
    }

    .badge.standard {
      background: rgba(33, 150, 243, 0.15);
      color: #2196F3;
      border: 1px solid rgba(33, 150, 243, 0.3);
    }

    .badge.succeeded {
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .data-source {
      padding: 12px;
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.2);
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #4CAF50;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }

      .stat-value {
        font-size: 24px;
      }

      .header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- 로그인 페이지 -->
  <div class="login-page" id="loginPage">
    <div class="login-container">
      <div class="login-title">🔐 관리자</div>
      <p class="login-subtitle">KRK 관리자 대시보드 접속</p>
      
      <div class="login-error" id="loginError"></div>
      
      <form class="login-form" id="loginForm">
        <input 
          type="password" 
          id="adminPassword" 
          placeholder="관리자 패스워드" 
          required 
          autocomplete="off"
        >
        <button type="submit">로그인</button>
      </form>

      <div class="login-tip">
        💡 테스트 패스워드: <strong>admin123</strong>
      </div>
    </div>
  </div>

  <!-- 대시보드 페이지 -->
  <div class="dashboard-page hidden" id="dashboardPage">
    <div class="container">
      <!-- 헤더 -->
      <div class="header">
        <div class="header-title">📊 KRK 관리자 대시보드</div>
        <div class="header-admin-info">
          <span class="admin-badge">관리자 모드</span>
          <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
        </div>
      </div>

      <!-- 데이터 출처 표시 -->
      <div class="data-source" id="dataSource"></div>

      <!-- 통계 카드 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">총 가입자</div>
          <div class="stat-value" id="totalUsers">0</div>
          <div class="stat-unit">명</div>
          <div class="stat-change">실시간 데이터</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">활성 사용자</div>
          <div class="stat-value" id="activeUsers">0</div>
          <div class="stat-unit" id="activeUsersPercent">명</div>
          <div class="stat-change">실시간 데이터</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">월 매출</div>
          <div class="stat-value" id="monthlyRevenue">0</div>
          <div class="stat-unit">원</div>
          <div class="stat-change">실시간 데이터</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">STANDARD 구독</div>
          <div class="stat-value" id="premiumCount">0</div>
          <div class="stat-unit">명</div>
          <div class="stat-change">실시간 데이터</div>
        </div>
      </div>

      <!-- 고객 목록 -->
      <div class="table-section">
        <h3 class="table-title">👥 고객 목록 (총 <span id="customerCount">0</span>명)</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>이메일</th>
                <th>회사명</th>
                <th>플랜</th>
                <th>가입일</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="customerTable">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'admin123';

    // ==================== 데이터 로드 ====================
    let customers = [];
    let dataSource = '❌ 로드할 데이터 없음';

    function loadCustomersFromLocalStorage() {
      const savedUsers = localStorage.getItem('krk_all_users');
      
      if (savedUsers) {
        try {
          const users = JSON.parse(savedUsers);
          if (users && users.length > 0) {
            customers = users;
            dataSource = `✅ localStorage에서 로드됨 (${users.length}명)`;
            console.log('✅ 실제 가입한 회원들이 로드되었습니다!', customers);
            return true;
          }
        } catch (e) {
          console.error('데이터 파싱 실패:', e);
        }
      }

      dataSource = '⚠️ 가입한 회원이 없습니다. (테스트 데이터 사용 권장)';
      console.log('⚠️ localStorage에 데이터가 없습니다.');
      return false;
    }

    // ==================== 통계 계산 ====================
    function calculateStats() {
      const totalUsers = customers.length;
      const activeUsersCount = customers.filter(c => c.status === 'active').length;
      const activePercent = totalUsers > 0 ? Math.round((activeUsersCount / totalUsers) * 100) : 0;
      
      const standardCount = customers.filter(c => c.plan === 'STANDARD').length;
      const monthlyRevenue = standardCount * 19900; // STANDARD 플랜 가격 (할인 중: 19,900원, 정상가: 29,900원)

      document.getElementById('totalUsers').textContent = totalUsers;
      document.getElementById('activeUsers').textContent = activeUsersCount;
      document.getElementById('activeUsersPercent').textContent = `명 (${activePercent}%)`;
      document.getElementById('monthlyRevenue').textContent = monthlyRevenue.toLocaleString();
      document.getElementById('premiumCount').textContent = standardCount;
      document.getElementById('customerCount').textContent = totalUsers;
      document.getElementById('dataSource').textContent = dataSource;
    }

    // ==================== 테이블 렌더링 ====================
    function renderCustomerTable() {
      const tbody = document.getElementById('customerTable');
      
      if (customers.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align: center; padding: 40px; color: #7A8FA3;">
              📭 가입한 회원이 없습니다. signup.html에서 회원가입 후 확인하세요.
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = customers.map(customer => `
        <tr>
          <td>${customer.email}</td>
          <td>${customer.company}</td>
          <td><span class="badge ${customer.plan.toLowerCase()}">${customer.plan}</span></td>
          <td>${customer.joinDate}</td>
          <td><span class="badge active">${customer.status === 'active' ? '활성' : '비활성'}</span></td>
        </tr>
      `).join('');
    }

    // ==================== 로그인 처리 ====================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      handleLogin();
    });

    function handleLogin() {
      const password = document.getElementById('adminPassword').value;
      const errorEl = document.getElementById('loginError');

      if (password === ADMIN_PASSWORD) {
        errorEl.classList.remove('show');
        localStorage.setItem('admin_logged_in', 'true');
        showDashboard();
      } else {
        errorEl.textContent = '❌ 패스워드가 올바르지 않습니다.';
        errorEl.classList.add('show');
        document.getElementById('adminPassword').value = '';
      }
    }

    function handleLogout() {
      if (confirm('로그아웃 하시겠습니까?')) {
        localStorage.removeItem('admin_logged_in');
        showLogin();
      }
    }

    function showDashboard() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('dashboardPage').classList.remove('hidden');
      
      // 데이터 로드 및 표시
      loadCustomersFromLocalStorage();
      calculateStats();
      renderCustomerTable();
    }

    function showLogin() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('dashboardPage').classList.add('hidden');
      document.getElementById('adminPassword').value = '';
    }

    // 페이지 로드 시
    window.addEventListener('load', function() {
      if (localStorage.getItem('admin_logged_in') === 'true') {
        showDashboard();
      } else {
        showLogin();
      }
    });
  </script>
</body>
</html>
