<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KRK - 라벨부터 신고까지, 한 곳에서">
  <title>KRK - 로그인</title>
  
  <!-- Pretendard 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 디자인 시스템 -->
  <link rel="stylesheet" href="css/krkk-design-system.css">
  
  <style>
    /* KRK 커스터마이징 */
    :root {
      --krk-primary: #1A2B4C;
      --krk-accent: #B8D4FF;
      --krk-bg: #F0F4F8;
    }

    body {
      background: linear-gradient(135deg, #F0F4F8 0%, #E3EDF7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--spacing-md);
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--spacing-3xl);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .logo-img {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
    }

    .logo-placeholder {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .logo-text {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-dark);
      letter-spacing: 2px;
    }

    .auth-header h1 {
      font-size: var(--font-size-lg);
      margin-bottom: var(--spacing-sm);
      color: var(--color-text-dark);
    }

    .auth-subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-light);
      margin: 0;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--radius-xl);
      padding: var(--spacing-2xl);
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .form-group {
      margin-bottom: var(--spacing-xl);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--spacing-sm);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-dark);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(26, 43, 76, 0.15);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      font-family: var(--font-primary);
      font-size: var(--font-size-base);
      color: var(--color-text-dark);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input::placeholder {
      color: var(--color-text-lighter);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--krk-accent);
      box-shadow: 0 0 0 3px rgba(184, 212, 255, 0.2);
    }

    .error-message {
      display: none;
      font-size: var(--font-size-xs);
      color: var(--color-error);
      margin-top: var(--spacing-xs);
    }

    .error-message.show {
      display: block;
    }

    .remember-forgot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-xl);
      margin-top: var(--spacing-md);
      font-size: var(--font-size-sm);
    }

    .remember-forgot input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--krk-accent);
      margin-right: var(--spacing-xs);
      flex-shrink: 0;
    }

    .remember-forgot label {
      display: flex;
      align-items: center;
      cursor: pointer;
      margin: 0;
      color: var(--color-text-light);
    }

    .forgot-link {
      color: var(--krk-accent);
      text-decoration: none;
      font-weight: var(--font-weight-semibold);
      transition: color 0.3s ease;
    }

    .forgot-link:hover {
      color: var(--color-text-dark);
    }

    .btn-submit {
      width: 100%;
      padding: 16px 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.8));
      color: white;
      font-family: var(--font-primary);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: var(--spacing-lg);
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, rgba(26, 43, 76, 1), rgba(26, 43, 76, 0.9));
      box-shadow: 0 8px 20px rgba(26, 43, 76, 0.2);
      transform: translateY(-2px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--spacing-lg);
      font-size: var(--font-size-sm);
      color: var(--color-text-light);
    }

    .auth-footer span {
      margin: 0 var(--spacing-xs);
    }

    .auth-footer a {
      color: var(--krk-accent);
      font-weight: var(--font-weight-semibold);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .auth-footer a:hover {
      color: var(--color-text-dark);
      text-decoration: underline;
    }

    /* 에러 알림 */
    .error-alert {
      display: none;
      padding: var(--spacing-md);
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: var(--radius-sm);
      color: var(--color-error);
      font-size: var(--font-size-sm);
      margin-bottom: var(--spacing-lg);
      animation: slideDown 0.3s ease;
    }

    .error-alert.show {
      display: block;
    }

    /* 성공 메시지 */
    .success-message {
      display: none;
      padding: var(--spacing-md);
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: var(--radius-sm);
      color: var(--color-success);
      font-size: var(--font-size-sm);
      margin-bottom: var(--spacing-lg);
      animation: slideDown 0.3s ease;
    }

    .success-message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 로딩 상태 */
    .btn-submit.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* 반응형 */
    @media (max-width: 640px) {
      .auth-container {
        padding: 0 var(--spacing-md);
      }

      .auth-card {
        padding: var(--spacing-xl);
      }

      .auth-header h1 {
        font-size: var(--font-size-lg);
      }

      .logo-img {
        width: 40px;
        height: 40px;
      }

      .logo-text {
        font-size: var(--font-size-xl);
      }

      .form-group {
        margin-bottom: var(--spacing-lg);
      }

      .remember-forgot {
        flex-direction: column;
        align-items: flex-start;
        gap: var(--spacing-sm);
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- 헤더 -->
    <div class="auth-header">
      <div class="logo-container">
        <!-- <img src="assets/logo.png" alt="KRK" class="logo-img"> -->
        <div class="logo-placeholder">🍳</div>
        <span class="logo-text">KRK</span>
      </div>
      <h1>로그인</h1>
      <p class="auth-subtitle">라벨부터 신고까지, 한 곳에서</p>
    </div>

    <!-- 폼 -->
    <div class="auth-card">
      <div class="error-alert" id="errorAlert"></div>
      <div class="success-message" id="successMessage">
        ✓ 로그인이 완료되었습니다! 대시보드로 이동합니다...
      </div>

      <form id="loginForm">
        <!-- 이메일 -->
        <div class="form-group">
          <label for="email">이메일</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="info@example.com"
            required
          >
          <span class="error-message" id="emailError"></span>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="••••••••"
            required
          >
          <span class="error-message" id="passwordError"></span>
        </div>

        <!-- 기억하기 & 비밀번호 찾기 -->
        <div class="remember-forgot">
          <label>
            <input type="checkbox" id="remember" name="remember">
            <span>이 기기에서 로그인 상태 유지</span>
          </label>
          <a href="#" class="forgot-link" onclick="event.preventDefault(); alert('비밀번호 초기화 기능은 준비 중입니다.');">비밀번호 찾기</a>
        </div>

        <!-- 제출 버튼 -->
        <button type="submit" class="btn-submit" id="submitBtn">로그인</button>
      </form>

      <!-- 가입 링크 -->
      <div class="auth-footer">
        아직 계정이 없으신가요? 
        <a href="signup.html">회원가입</a>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMessage = document.getElementById('successMessage');
    const errorAlert = document.getElementById('errorAlert');

    // 유효성 검사
    const validators = {
      email: (value) => {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(value) ? null : '유효한 이메일을 입력하세요';
      },
      password: (value) => {
        return value.length > 0 ? null : '비밀번호를 입력하세요';
      }
    };

    // 에러 메시지 표시
    function showError(fieldName, message) {
      const errorEl = document.getElementById(`${fieldName}Error`);
      if (message) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      } else {
        errorEl.classList.remove('show');
        errorEl.textContent = '';
      }
    }

    // 필드 검증
    function validateField(fieldName) {
      const field = document.getElementById(fieldName);
      const validator = validators[fieldName];
      
      if (validator) {
        const error = validator(field.value);
        showError(fieldName, error);
        return !error;
      }
      return true;
    }

    // 실시간 검증
    Object.keys(validators).forEach(fieldName => {
      const field = document.getElementById(fieldName);
      if (field) {
        field.addEventListener('blur', () => validateField(fieldName));
        field.addEventListener('input', () => {
          if (document.getElementById(`${fieldName}Error`).classList.contains('show')) {
            validateField(fieldName);
          }
        });
      }
    });

    // 폼 제출
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // 모든 필드 검증
      const isEmailValid = validateField('email');
      const isPasswordValid = validateField('password');

      if (!isEmailValid || !isPasswordValid) {
        return;
      }

      // 제출 상태
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      errorAlert.classList.remove('show');

      try {
        // localStorage에서 사용자 데이터 가져오기
        const userData = localStorage.getItem('krk_user');
        
        if (!userData) {
          throw new Error('등록된 계정을 찾을 수 없습니다');
        }

        const user = JSON.parse(userData);
        const enteredEmail = document.getElementById('email').value;
        const enteredPassword = document.getElementById('password').value;

        // 이메일 확인 (MVP에서는 간단히 처리)
        if (user.email !== enteredEmail) {
          throw new Error('이메일 또는 비밀번호가 맞지 않습니다');
        }

        // 비밀번호 확인 (MVP에서는 localStorage의 비밀번호와 비교)
        // 실제로는 Supabase에서 해시된 비밀번호로 비교합니다
        const savedPassword = localStorage.getItem('krk_password_' + user.id);
        if (savedPassword !== enteredPassword) {
          throw new Error('이메일 또는 비밀번호가 맞지 않습니다');
        }

        // 세션 생성
        localStorage.setItem('krk_session', user.id);
        if (document.getElementById('remember').checked) {
          localStorage.setItem('krk_remember', 'true');
        }

        // 성공 메시지 표시
        successMessage.classList.add('show');

        // 2초 후 대시보드로 이동
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 2000);

      } catch (error) {
        errorAlert.textContent = error.message;
        errorAlert.classList.add('show');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    // 페이지 로드시 이미 로그인되어 있으면 대시보드로 이동
    window.addEventListener('load', () => {
      const session = localStorage.getItem('krk_session');
      if (session) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
