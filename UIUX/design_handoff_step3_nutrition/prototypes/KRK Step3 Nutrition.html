<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>krk check — Step 3 / 영양성분</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #EFEEEA; font-family: 'Pretendard', 'Pretendard Variable', system-ui, sans-serif; color: #1E1E1E; overflow: hidden; }
  .krk-frame { width: 390px; height: 844px; background: #F4F4F5; border: 1px solid rgba(30,30,30,0.10); overflow: hidden; position: relative; }
  .krk-status { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: #0A0A0B; }
  .krk-status-right { display: flex; align-items: center; gap: 5px; }
  .krk-frame-body { position: absolute; top: 44px; left: 0; right: 0; bottom: 0; overflow: hidden; }
  .krk-desktop { width: 1280px; height: 820px; background: #F4F4F5; border: 1px solid rgba(30,30,30,0.10); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .krk-browser-bar { height: 32px; background: #f0eee9; border-bottom: 1px solid rgba(10,10,11,0.08); display: flex; align-items: center; padding: 0 14px; gap: 8px; flex-shrink: 0; }
  .krk-browser-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(10,10,11,0.18); }
  .krk-browser-url { margin-left: 14px; flex: 1; height: 20px; background: #fff; border: 1px solid rgba(10,10,11,0.10); display: flex; align-items: center; padding: 0 10px; font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(10,10,11,0.55); letter-spacing: 0.02em; max-width: 320px; }
  ::selection { background: #0CA4F9; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="step3-nutrition.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { Step3Nutrition } = window;

function MobileStatusBar() {
  return (
    <div className="krk-status">
      <span>9:41</span>
      <div className="krk-status-right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
          <rect x="0" y="7" width="3" height="4" rx="0.5" fill="#0A0A0B"/>
          <rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#0A0A0B"/>
          <rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#0A0A0B"/>
          <rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#0A0A0B"/>
        </svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <path d="M7.5 9.5a1 1 0 1 0 0 .01" stroke="#0A0A0B" strokeWidth="1.5"/>
          <path d="M3.5 6.5a6 6 0 0 1 8 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
          <path d="M1 4a9.5 9.5 0 0 1 13 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
        </svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none">
          <rect x="0.5" y="0.5" width="21" height="10" rx="2.2" stroke="#0A0A0B" strokeOpacity="0.45" fill="none"/>
          <rect x="2" y="2" width="18" height="7" rx="1.2" fill="#0A0A0B"/>
          <rect x="22.5" y="3.5" width="1.5" height="4" rx="0.5" fill="#0A0A0B" fillOpacity="0.45"/>
        </svg>
      </div>
    </div>
  );
}

function MobileFrame({ children }) {
  return <div className="krk-frame"><MobileStatusBar /><div className="krk-frame-body">{children}</div></div>;
}

function DesktopFrame({ children }) {
  return (
    <div className="krk-desktop">
      <div className="krk-browser-bar">
        <span className="krk-browser-dot"/><span className="krk-browser-dot"/><span className="krk-browser-dot"/>
        <div className="krk-browser-url">krk.team/new — Step 3 / 4</div>
      </div>
      <div style={{ flex: 1, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>{children}</div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="krk check / Step 3 — 영양성분"
      subtitle="2 variations. A안 = 3-mode (choose/input/exempted) + 면제 진단 모달 · B안 = Inline 진단 (모달 없이 collapsible)"
      initialZoom={0.42}
    >
      {/* ─── A안 · Desktop ──────────────────────────────── */}
      <DCSection
        id="a-desktop"
        title="A안 · Desktop — 3-mode + 모달 (브리프 충실)"
        subtitle="choose / input / exempted 3가지 모드 toggle. 면제 진단은 별도 모달 (4개 질문 yes/no → 결과). 브리프 사양 그대로 적용."
      >
        <DCArtboard id="a-d-choose" label="01 — choose (최초 진입, 면제 안내 배너)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="A" mode="choose" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-input-empty" label="02 — input · 빈 폼" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="A" mode="input-empty" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-input-filled" label="03 — input · 값 입력됨 (canGoNext)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="A" mode="input-filled" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-exempted" label="04 — exempted (면제 적용됨)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="A" mode="exempted" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-modal-empty" label="05 — 면제 진단 모달 · 미답변" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="A" mode="modal-empty" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-modal-pass" label="06 — 면제 진단 모달 · 4 yes (면제 가능)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="A" mode="modal-pass" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-modal-fail" label="07 — 면제 진단 모달 · no 1개 (면제 불가)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="A" mode="modal-fail" device="desktop" /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── A안 · Mobile ─────────────────────────────── */}
      <DCSection
        id="a-mobile"
        title="A안 · Mobile"
        subtitle="choose / input filled / 모달 pass 핵심 상태만."
      >
        <DCArtboard id="a-m-choose" label="08 — Mobile · choose" width={390} height={844}>
          <MobileFrame><Step3Nutrition variation="A" mode="choose" device="mobile" /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="a-m-input-filled" label="09 — Mobile · input filled" width={390} height={844}>
          <MobileFrame><Step3Nutrition variation="A" mode="input-filled" device="mobile" /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="a-m-modal-pass" label="10 — Mobile · 모달 pass" width={390} height={844}>
          <MobileFrame><Step3Nutrition variation="A" mode="modal-pass" device="mobile" /></MobileFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── B안 · Desktop ─────────────────────────────── */}
      <DCSection
        id="b-desktop"
        title="B안 · Desktop — Inline 진단 (모달 없음)"
        subtitle="면제 자가진단을 페이지 내 collapsible 카드로. 모달 전환 없이 진단 + 입력이 같은 화면에 공존. choose 모드 = 진단 접힘 + 입력 폼 동시 노출."
      >
        <DCArtboard id="b-d-choose" label="11 — 진단 접힘 + 입력 폼 (default landing)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="B" mode="choose" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-modal-empty" label="12 — 진단 펼침 · 미답변" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="B" mode="modal-empty" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-modal-pass" label="13 — 진단 펼침 · pass (인라인 결과)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="B" mode="modal-pass" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-modal-fail" label="14 — 진단 펼침 · fail (직접 입력 유도)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="B" mode="modal-fail" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-input-filled" label="15 — 입력 채워짐 (진단 접힘)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="B" mode="input-filled" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-exempted" label="16 — 면제 적용 (진단 결과 + 면제 배너)" width={1280} height={820}>
          <DesktopFrame><Step3Nutrition variation="B" mode="exempted" device="desktop" /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── B안 · Mobile ─────────────────────────────── */}
      <DCSection
        id="b-mobile"
        title="B안 · Mobile"
        subtitle="Inline 진단은 모바일에서 자연스러움 — 모달 전환 없이 스크롤로 모든 상태 접근."
      >
        <DCArtboard id="b-m-choose" label="17 — Mobile · 진단 접힘" width={390} height={844}>
          <MobileFrame><Step3Nutrition variation="B" mode="choose" device="mobile" /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="b-m-modal-pass" label="18 — Mobile · 진단 pass" width={390} height={844}>
          <MobileFrame><Step3Nutrition variation="B" mode="modal-pass" device="mobile" /></MobileFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
