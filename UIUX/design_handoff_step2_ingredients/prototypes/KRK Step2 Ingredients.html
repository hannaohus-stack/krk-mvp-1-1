<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>krk check — Step 2 / 원재료 정보</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #EFEEEA; font-family: 'Pretendard', 'Pretendard Variable', system-ui, sans-serif; color: #1E1E1E; overflow: hidden; }
  .krk-frame { width: 390px; height: 844px; background: #F4F4F5; border: 1px solid rgba(30,30,30,0.10); overflow: hidden; position: relative; }
  .krk-status { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: #0A0A0B; }
  .krk-status-right { display: flex; align-items: center; gap: 5px; }
  .krk-frame-body { position: absolute; top: 44px; left: 0; right: 0; bottom: 0; overflow: hidden; }
  .krk-desktop { width: 1280px; height: 820px; background: #F4F4F5; border: 1px solid rgba(30,30,30,0.10); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .krk-browser-bar { height: 32px; background: #f0eee9; border-bottom: 1px solid rgba(10,10,11,0.08); display: flex; align-items: center; padding: 0 14px; gap: 8px; flex-shrink: 0; }
  .krk-browser-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(10,10,11,0.18); }
  .krk-browser-url { margin-left: 14px; flex: 1; height: 20px; background: #fff; border: 1px solid rgba(10,10,11,0.10); display: flex; align-items: center; padding: 0 10px; font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(10,10,11,0.55); letter-spacing: 0.02em; max-width: 320px; }
  ::selection { background: #0CA4F9; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="step2-ingredients.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { Step2Ingredients } = window;

function MobileStatusBar() {
  return (
    <div className="krk-status">
      <span>9:41</span>
      <div className="krk-status-right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
          <rect x="0" y="7" width="3" height="4" rx="0.5" fill="#0A0A0B"/>
          <rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#0A0A0B"/>
          <rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#0A0A0B"/>
          <rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#0A0A0B"/>
        </svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <path d="M7.5 9.5a1 1 0 1 0 0 .01" stroke="#0A0A0B" strokeWidth="1.5"/>
          <path d="M3.5 6.5a6 6 0 0 1 8 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
          <path d="M1 4a9.5 9.5 0 0 1 13 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
        </svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none">
          <rect x="0.5" y="0.5" width="21" height="10" rx="2.2" stroke="#0A0A0B" strokeOpacity="0.45" fill="none"/>
          <rect x="2" y="2" width="18" height="7" rx="1.2" fill="#0A0A0B"/>
          <rect x="22.5" y="3.5" width="1.5" height="4" rx="0.5" fill="#0A0A0B" fillOpacity="0.45"/>
        </svg>
      </div>
    </div>
  );
}

function MobileFrame({ children }) {
  return <div className="krk-frame"><MobileStatusBar /><div className="krk-frame-body">{children}</div></div>;
}

function DesktopFrame({ children }) {
  return (
    <div className="krk-desktop">
      <div className="krk-browser-bar">
        <span className="krk-browser-dot"/><span className="krk-browser-dot"/><span className="krk-browser-dot"/>
        <div className="krk-browser-url">krk.team/new — Step 2 / 4</div>
      </div>
      <div style={{ flex: 1, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>{children}</div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="krk check / Step 2 — 원재료 정보"
      subtitle="2 variations × 4 states. A안 = 6-col 테이블 (브리프 충실, 전문가 친화) · B안 = Card stack (모바일 친화, 인라인 자동감지 태그)"
      initialZoom={0.4}
    >
      {/* ─── A안 · Desktop ──────────────────────────────── */}
      <DCSection
        id="a-desktop"
        title="A안 · Desktop — 6-col 테이블"
        subtitle="브리프 그대로. 한 행에 이름/중량/비율/알레르기/복합/삭제 모두 표시. 자동완성 드롭다운은 active row 아래 absolute로 떠오름."
      >
        <DCArtboard id="a-d-empty" label="01 — Empty (빈 상태)" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="A" mode="empty" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-filled" label="02 — Filled · 5 ingredients (정상)" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="A" mode="filled" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-autocomplete" label="03 — Autocomplete dropdown 열림" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="A" mode="autocomplete" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-detected" label="04 — 알레르기 3종 + 복합원재료 감지" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="A" mode="detected" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-warnings" label="05 — 총중량 초과 + 정렬 오류 (자동정렬 버튼)" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="A" mode="warnings" device="desktop" /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── A안 · Mobile ─────────────────────────────── */}
      <DCSection
        id="a-mobile"
        title="A안 · Mobile"
        subtitle="6컬럼 테이블이 좁아져 셀이 빠듯하나 같은 구조 유지. 핵심 2개 상태만 노출."
      >
        <DCArtboard id="a-m-empty" label="06 — Mobile · Empty" width={390} height={844}>
          <MobileFrame><Step2Ingredients variation="A" mode="empty" device="mobile" /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="a-m-warnings" label="07 — Mobile · 경고 2종" width={390} height={844}>
          <MobileFrame><Step2Ingredients variation="A" mode="warnings" device="mobile" /></MobileFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── B안 · Desktop ─────────────────────────────── */}
      <DCSection
        id="b-desktop"
        title="B안 · Desktop — Card stack (인라인 자동감지)"
        subtitle="각 원재료가 stacked 카드. 첫 줄: 번호 + 이름 인풋 + 삭제. 둘째 줄: 중량/비율 + 알레르기/복합 태그 인라인. 자동감지 태그에 AUTO 표시. 모바일 친화."
      >
        <DCArtboard id="b-d-empty" label="08 — Empty (빈 상태)" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="B" mode="empty" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-filled" label="09 — Filled · 5 ingredients" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="B" mode="filled" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-autocomplete" label="10 — Autocomplete dropdown" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="B" mode="autocomplete" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-detected" label="11 — 자동감지 태그 활성 (알레르기 3 + 복합 1)" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="B" mode="detected" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-warnings" label="12 — 총중량 초과 + 정렬 오류" width={1280} height={820}>
          <DesktopFrame><Step2Ingredients variation="B" mode="warnings" device="desktop" /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── B안 · Mobile ─────────────────────────────── */}
      <DCSection
        id="b-mobile"
        title="B안 · Mobile"
        subtitle="Card stack은 모바일에서 자연스러움 — 좁은 폭에서도 모든 정보 가독성 유지."
      >
        <DCArtboard id="b-m-empty" label="13 — Mobile · Empty" width={390} height={844}>
          <MobileFrame><Step2Ingredients variation="B" mode="empty" device="mobile" /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="b-m-detected" label="14 — Mobile · 자동감지 태그" width={390} height={844}>
          <MobileFrame><Step2Ingredients variation="B" mode="detected" device="mobile" /></MobileFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
