<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>krk check — Step 4 / 라벨 미리보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #EFEEEA;
    font-family: 'Pretendard', 'Pretendard Variable', system-ui, -apple-system, sans-serif;
    color: #1E1E1E;
    overflow: hidden;
  }
  .krk-frame {
    width: 390px;
    height: 844px;
    background: #F4F4F5;
    border: 1px solid rgba(30,30,30,0.10);
    overflow: hidden;
    position: relative;
  }
  .krk-status {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #0A0A0B;
  }
  .krk-status-right { display: flex; align-items: center; gap: 5px; }
  .krk-frame-body {
    position: absolute;
    top: 44px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  .krk-desktop {
    width: 1280px;
    height: 820px;
    background: #F4F4F5;
    border: 1px solid rgba(30,30,30,0.10);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .krk-browser-bar {
    height: 32px;
    background: #f0eee9;
    border-bottom: 1px solid rgba(10,10,11,0.08);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .krk-browser-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(10,10,11,0.18);
  }
  .krk-browser-url {
    margin-left: 14px;
    flex: 1;
    height: 20px;
    background: #fff;
    border: 1px solid rgba(10,10,11,0.10);
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    color: rgba(10,10,11,0.55);
    letter-spacing: 0.02em;
    max-width: 320px;
  }

  ::selection { background: #0CA4F9; color: #fff; }
  ::-moz-selection { background: #0CA4F9; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="step4-preview.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { Step4Preview } = window;

function MobileStatusBar() {
  return (
    <div className="krk-status">
      <span>9:41</span>
      <div className="krk-status-right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
          <rect x="0" y="7" width="3" height="4" rx="0.5" fill="#0A0A0B"/>
          <rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#0A0A0B"/>
          <rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#0A0A0B"/>
          <rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#0A0A0B"/>
        </svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <path d="M7.5 9.5a1 1 0 1 0 0 .01" stroke="#0A0A0B" strokeWidth="1.5"/>
          <path d="M3.5 6.5a6 6 0 0 1 8 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
          <path d="M1 4a9.5 9.5 0 0 1 13 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
        </svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none">
          <rect x="0.5" y="0.5" width="21" height="10" rx="2.2" stroke="#0A0A0B" strokeOpacity="0.45" fill="none"/>
          <rect x="2" y="2" width="18" height="7" rx="1.2" fill="#0A0A0B"/>
          <rect x="22.5" y="3.5" width="1.5" height="4" rx="0.5" fill="#0A0A0B" fillOpacity="0.45"/>
        </svg>
      </div>
    </div>
  );
}

function MobileFrame({ children }) {
  return (
    <div className="krk-frame">
      <MobileStatusBar />
      <div className="krk-frame-body">{children}</div>
    </div>
  );
}

function DesktopFrame({ children }) {
  return (
    <div className="krk-desktop">
      <div className="krk-browser-bar">
        <span className="krk-browser-dot"/>
        <span className="krk-browser-dot"/>
        <span className="krk-browser-dot"/>
        <div className="krk-browser-url">krk.team/new/preview — Step 4 / 4</div>
      </div>
      <div style={{ flex: 1, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="krk check / Step 4 — 라벨 미리보기"
      subtitle="2 variations × 4 states. A안 = 라벨이 hero (와이어 그대로 + KRK 톤) · B안 = 검토 결과가 hero (라벨은 thumbnail)"
      initialZoom={0.4}
    >
      {/* ─── A안 · Desktop ───────────────────────────────── */}
      <DCSection
        id="a-desktop"
        title="A안 · Desktop — 라벨 hero"
        subtitle="와이어프레임 구조 유지 (좌 미리보기 + 우 사이드 300px). 라벨이 큼지막하게 보이고, 사이드에 이슈/패스 카드가 컴팩트하게 정렬됩니다."
      >
        <DCArtboard id="a-d-missing" label="01 — 누락 2건 (제조원 + 알레르기)" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="A" mode="missing" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-allpass" label="02 — 모두 통과" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="A" mode="all-pass" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-exempt" label="03 — 영양성분 면제 (즉판가공업)" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="A" mode="exempt" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="a-d-multi" label="04 — 다중 위반 (필수 4 + 보완 1)" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="A" mode="multi-violation" device="desktop" /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── A안 · Mobile ────────────────────────────────── */}
      <DCSection
        id="a-mobile"
        title="A안 · Mobile"
        subtitle="2-col → 1-col stack. 상태 카드는 헤더 아래로 내려가고, 라벨도 위→아래 순서로 정렬됩니다."
      >
        <DCArtboard id="a-m-missing" label="05 — Mobile · 누락 2건" width={390} height={844}>
          <MobileFrame><Step4Preview variation="A" mode="missing" device="mobile" /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="a-m-allpass" label="06 — Mobile · 모두 통과" width={390} height={844}>
          <MobileFrame><Step4Preview variation="A" mode="all-pass" device="mobile" /></MobileFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── B안 · Desktop ───────────────────────────────── */}
      <DCSection
        id="b-desktop"
        title="B안 · Desktop — 검토 결과 hero"
        subtitle="검토 상태 / 이슈 / 패스 항목이 메인 컬럼을 차지하고, 라벨은 우측 300px 사이드에 thumbnail로 sticky. 의사결정 중심의 레이아웃."
      >
        <DCArtboard id="b-d-missing" label="07 — 누락 2건 (제조원 + 알레르기)" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="B" mode="missing" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-allpass" label="08 — 모두 통과" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="B" mode="all-pass" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-exempt" label="09 — 영양성분 면제" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="B" mode="exempt" device="desktop" /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="b-d-multi" label="10 — 다중 위반 (필수 4 + 보완 1)" width={1280} height={820}>
          <DesktopFrame><Step4Preview variation="B" mode="multi-violation" device="desktop" /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── B안 · Mobile ────────────────────────────────── */}
      <DCSection
        id="b-mobile"
        title="B안 · Mobile"
        subtitle="라벨 썸네일이 본문 하단으로 내려가고, 검토 결과가 상단부터 자연스럽게 읽힙니다."
      >
        <DCArtboard id="b-m-missing" label="11 — Mobile · 누락 2건" width={390} height={844}>
          <MobileFrame><Step4Preview variation="B" mode="missing" device="mobile" /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="b-m-allpass" label="12 — Mobile · 모두 통과" width={390} height={844}>
          <MobileFrame><Step4Preview variation="B" mode="all-pass" device="mobile" /></MobileFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
