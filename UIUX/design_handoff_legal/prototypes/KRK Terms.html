<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>krk check — 이용약관</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #EFEEEA; font-family: 'Pretendard', sans-serif; color: #1E1E1E; overflow: hidden; }
  .krk-frame { width: 390px; height: 844px; background: #fff; border: 1px solid rgba(30,30,30,0.10); overflow: hidden; position: relative; }
  .krk-status { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: #0A0A0B; background: #fff; }
  .krk-status-right { display: flex; align-items: center; gap: 5px; }
  .krk-frame-body { position: absolute; top: 44px; left: 0; right: 0; bottom: 0; overflow: hidden; }
  .krk-desktop { width: 1280px; height: 820px; background: #fff; border: 1px solid rgba(30,30,30,0.10); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .krk-browser-bar { height: 32px; background: #f0eee9; border-bottom: 1px solid rgba(10,10,11,0.08); display: flex; align-items: center; padding: 0 14px; gap: 8px; flex-shrink: 0; }
  .krk-browser-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(10,10,11,0.18); }
  .krk-browser-url { margin-left: 14px; flex: 1; height: 20px; background: #fff; border: 1px solid rgba(10,10,11,0.10); display: flex; align-items: center; padding: 0 10px; font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(10,10,11,0.55); letter-spacing: 0.02em; max-width: 280px; }
  ::selection { background: #0CA4F9; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="legal-docs.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { LegalDoc } = window;

function MobileStatusBar() {
  return (
    <div className="krk-status">
      <span>9:41</span>
      <div className="krk-status-right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><rect x="0" y="7" width="3" height="4" rx="0.5" fill="#0A0A0B"/><rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#0A0A0B"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#0A0A0B"/><rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#0A0A0B"/></svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><path d="M3.5 6.5a6 6 0 0 1 8 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/><path d="M1 4a9.5 9.5 0 0 1 13 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/></svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none"><rect x="0.5" y="0.5" width="21" height="10" rx="2.2" stroke="#0A0A0B" strokeOpacity="0.45" fill="none"/><rect x="2" y="2" width="18" height="7" rx="1.2" fill="#0A0A0B"/></svg>
      </div>
    </div>
  );
}

function MobileFrame({ children }) {
  return <div className="krk-frame"><MobileStatusBar /><div className="krk-frame-body">{children}</div></div>;
}

function DesktopFrame({ url, children }) {
  return (
    <div className="krk-desktop">
      <div className="krk-browser-bar">
        <span className="krk-browser-dot"/><span className="krk-browser-dot"/><span className="krk-browser-dot"/>
        <div className="krk-browser-url">{url}</div>
      </div>
      <div style={{ flex: 1, overflow: 'auto', position: 'relative' }}>{children}</div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="krk check / 이용약관"
      subtitle="13개 조항 + 부칙 · 좌측 sticky 목차 (desktop) · v1.0 시행일 2026-06-01 · 변호사 검토 권장 안내 포함"
      initialZoom={0.5}
    >
      <DCSection id="desktop" title="Desktop" subtitle="좌측 sticky 목차 + 본문 1080 max-width">
        <DCArtboard id="d-terms" label="01 — Desktop · 이용약관" width={1280} height={820}>
          <DesktopFrame url="krk.team/terms"><LegalDoc doc="terms" device="desktop" /></DesktopFrame>
        </DCArtboard>
      </DCSection>
      <DCSection id="mobile" title="Mobile" subtitle="목차 숨김 · 본문만 stack">
        <DCArtboard id="m-terms" label="02 — Mobile · 이용약관" width={390} height={844}>
          <MobileFrame><LegalDoc doc="terms" device="mobile" /></MobileFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
