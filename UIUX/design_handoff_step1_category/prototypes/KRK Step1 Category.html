<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>krk check — Step 1 / Category v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #EFEEEA;
    font-family: 'Pretendard', 'Pretendard Variable', system-ui, -apple-system, sans-serif;
    color: #1E1E1E;
    overflow: hidden;
  }
  .krk-frame {
    width: 390px;
    height: 844px;
    background: #F4F4F5;
    border: 1px solid rgba(30,30,30,0.10);
    overflow: hidden;
    position: relative;
  }
  .krk-status {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #0A0A0B;
  }
  .krk-status-right { display: flex; align-items: center; gap: 5px; }
  .krk-frame-body {
    position: absolute;
    top: 44px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  .krk-desktop {
    width: 1280px;
    height: 820px;
    background: #F4F4F5;
    border: 1px solid rgba(30,30,30,0.10);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .krk-browser-bar {
    height: 32px;
    background: #f0eee9;
    border-bottom: 1px solid rgba(10,10,11,0.08);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .krk-browser-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(10,10,11,0.18);
  }
  .krk-browser-url {
    margin-left: 14px;
    flex: 1;
    height: 20px;
    background: #fff;
    border: 1px solid rgba(10,10,11,0.10);
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    color: rgba(10,10,11,0.55);
    letter-spacing: 0.02em;
    max-width: 320px;
  }

  ::selection { background: #0CA4F9; color: #fff; }
  ::-moz-selection { background: #0CA4F9; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="step1-category.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { Step1Category } = window;

function MobileStatusBar() {
  return (
    <div className="krk-status">
      <span>9:41</span>
      <div className="krk-status-right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
          <rect x="0" y="7" width="3" height="4" rx="0.5" fill="#0A0A0B"/>
          <rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#0A0A0B"/>
          <rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#0A0A0B"/>
          <rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#0A0A0B"/>
        </svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <path d="M7.5 9.5a1 1 0 1 0 0 .01" stroke="#0A0A0B" strokeWidth="1.5"/>
          <path d="M3.5 6.5a6 6 0 0 1 8 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
          <path d="M1 4a9.5 9.5 0 0 1 13 0" stroke="#0A0A0B" strokeWidth="1.3" fill="none"/>
        </svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none">
          <rect x="0.5" y="0.5" width="21" height="10" rx="2.2" stroke="#0A0A0B" strokeOpacity="0.45" fill="none"/>
          <rect x="2" y="2" width="18" height="7" rx="1.2" fill="#0A0A0B"/>
          <rect x="22.5" y="3.5" width="1.5" height="4" rx="0.5" fill="#0A0A0B" fillOpacity="0.45"/>
        </svg>
      </div>
    </div>
  );
}

function MobileFrame({ children }) {
  return (
    <div className="krk-frame">
      <MobileStatusBar />
      <div className="krk-frame-body">{children}</div>
    </div>
  );
}

function DesktopFrame({ children }) {
  return (
    <div className="krk-desktop">
      <div className="krk-browser-bar">
        <span className="krk-browser-dot"/>
        <span className="krk-browser-dot"/>
        <span className="krk-browser-dot"/>
        <div className="krk-browser-url">krk.team/new — Step 1 / 4</div>
      </div>
      <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
        {children}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="krk check / Step 1 — Category v2"
      subtitle="v2 정리 — Tier/가격 분기 제거 (service-v2). 입력 화면은 제품명 + 카테고리 + 사업자 유형만 수집."
    >
      {/* ─── v2 Desktop ───────────────────────────────────── */}
      <DCSection
        id="v2-desktop"
        title="Desktop · v2 (개선)"
        subtitle="① 그리드 마지막 행 가운데 정렬 (4-col, 7개 → 4+3 중앙) · ② Step 크럼 중복 제거 · ⑤ 푸터 empty stat-block · ⑥ 선택 카테고리 요약 라인 · ⑧ CTA '다음 — 원재료 정보'"
      >
        <DCArtboard id="v2-d-default" label="01 — Default (빈 상태 · 제품명 포커스 신호)" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="default" device="desktop" version={2} /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="v2-d-single" label="02 — 단일 선택 + 요약 라인" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="single" device="desktop" version={2} /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="v2-d-multi" label="03 — 다중 선택 (3개)" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="multi" device="desktop" version={2} /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="v2-d-sellside" label="04 — 즉판가공업 (디저트/베이커리)" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="sellside" device="desktop" version={2} /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── v2 Mobile ─────────────────────────────────────── */}
      <DCSection
        id="v2-mobile"
        title="Mobile · v2 (개선)"
        subtitle="2-col flex-wrap → 마지막 행 1개 가운데 정렬. 푸터는 stack."
      >
        <DCArtboard id="v2-m-default" label="06 — Mobile Default" width={390} height={844}>
          <MobileFrame><Step1Category mode="default" device="mobile" version={2} /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="v2-m-single" label="06 — Mobile 단일" width={390} height={844}>
          <MobileFrame><Step1Category mode="single" device="mobile" version={2} /></MobileFrame>
        </DCArtboard>
        <DCArtboard id="v2-m-sellside" label="07 — Mobile 즉판가공업" width={390} height={844}>
          <MobileFrame><Step1Category mode="sellside" device="mobile" version={2} /></MobileFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── v2 Validation ─────────────────────────────────── */}
      <DCSection
        id="v2-validation"
        title="Validation · v2"
        subtitle="⑦ 톤 다듬기 — 1px 보더 + 배경 제거. 메시지는 유지."
      >
        <DCArtboard id="v2-err-all" label="10 — 카테고리 + 사업자 둘 다 미선택" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="error" device="desktop" version={2} /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── v1 Archive (비교용) ───────────────────────────── */}
      <DCSection
        id="v1-archive"
        title="v1 (이전) · 비교용 아카이브"
        subtitle="동일 시나리오의 v1 — 그리드 CSS-grid (마지막 행 빈 셀) · Step 크럼 중복 · Tier S/A 라벨 (혼합) · 푸터 한 줄 회색 텍스트 · 선택 요약 없음 · CTA '다음 단계로'."
      >
        <DCArtboard id="v1-d-default" label="V1 — Desktop Default" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="default" device="desktop" version={1} /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="v1-d-mixed" label="V1 — Desktop 혼합" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="mixed" device="desktop" version={1} /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="v1-d-error" label="V1 — Desktop 에러 (1.5px + 배경)" width={1280} height={820}>
          <DesktopFrame><Step1Category mode="error" device="desktop" version={1} /></DesktopFrame>
        </DCArtboard>
        <DCArtboard id="v1-m-mixed" label="V1 — Mobile 혼합" width={390} height={844}>
          <MobileFrame><Step1Category mode="mixed" device="mobile" version={1} /></MobileFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
