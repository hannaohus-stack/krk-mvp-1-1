<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>krk check — PDF 3종 v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #EFEEEA;
    font-family: 'Pretendard', 'Pretendard Variable', system-ui, -apple-system, sans-serif;
    color: #1E1E1E;
    overflow: hidden;
  }

  ::selection { background: #0CA4F9; color: #fff; }
  ::-moz-selection { background: #0CA4F9; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="pdf-pages.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { PdfFoodLabel, PdfReport, PdfCertificate, DATA_SA_JAM, DATA_B_VIT } = window;

// 영양성분 면제 변형 (Tier S/A 데이터에서 면제만 토글)
const DATA_SA_JAM_EXEMPT = { ...DATA_SA_JAM, nutritionExempted: true };

function App() {
  return (
    <DesignCanvas
      title="krk check / PDF 3종 v4"
      subtitle="¹ 라벨 · ² 품목제조보고 입력 가이드 · ³ 라벨 검토 리포트 (자율 점검 기록). v4 — 명칭 전면 교체 + 면책 블록 명시 + QR 제거 (service-v2: Tier/베타 제거)."
      initialZoom={0.42}
    >
      {/* ─── ① 식품 라벨 ──────────────────────────── */}
      <DCSection
        id="label"
        title="PDF ① 식품 라벨"
        subtitle="/api/generate-label · A4 1장에 전면+후면 라벨 나란히. 식품유형은 식약처 공식 분류명, 알레르기는 detectedAllergens[] 자동 굵게. 기본/전문 패키지 모두에 포함."
      >
        <DCArtboard id="label-jam" label="01 — 잼류 · 식품제조가공업 (영양성분 포함)" width={794} height={1123}>
          <PdfFoodLabel data={DATA_SA_JAM} />
        </DCArtboard>
        <DCArtboard id="label-jam-exempt" label="02 — 잼류 · 즉판가공업 (영양성분 면제)" width={794} height={1123}>
          <PdfFoodLabel data={DATA_SA_JAM_EXEMPT} />
        </DCArtboard>
        <DCArtboard id="label-vit" label="03 — 건강식품(일반) → 기타식품류 · 즉판가공업" width={794} height={1123}>
          <PdfFoodLabel data={DATA_B_VIT} />
        </DCArtboard>
      </DCSection>

      {/* ─── ② 품목제조보고 입력 가이드 ────────────────── */}
      <DCSection
        id="report"
        title="PDF ② 품목제조보고 입력 가이드"
        subtitle="v4 — 명칭 변경 (‘품목제조보고서’ → ‘품목제조보고 입력 가이드’). 정부24 / 식품안전나라 안내 블록 추가. '제출용' 오해 차단. 전문 패키지에만 포함."
      >
        <DCArtboard id="report-jam" label="04 — 식품제조가공업 (잼류)" width={794} height={1123}>
          <PdfReport data={DATA_SA_JAM} />
        </DCArtboard>
        <DCArtboard id="report-vit" label="05 — 즉판가공업 (건강식품 → 기타식품류) · 영양성분 면제" width={794} height={1123}>
          <PdfReport data={DATA_B_VIT} />
        </DCArtboard>
      </DCSection>

      {/* ─── ③ 라벨 검토 리포트 (자율 점검 기록) ─────────── */}
      <DCSection
        id="report-self"
        title="PDF ③ krk 라벨 검토 리포트 · 사업자 자율 점검 기록"
        subtitle="v4 — 명칭 전면 교체 (‘검토 완료 인증서’ → ‘krk 라벨 검토 리포트’). 상단 4항목 면책 블록 명시 · QR 제거 → 기록 번호 박스 · ‘인증서/Certificate’ 단어 전면 제거. 전문 패키지에만 포함."
      >
        <DCArtboard id="self-pass" label="06 — 잼류 · 12/12 PASS" width={794} height={1123}>
          <PdfCertificate data={DATA_SA_JAM} resultMode="all-pass" />
        </DCArtboard>
        <DCArtboard id="self-mixed" label="07 — 잼류 · 주의 2건 (mixed)" width={794} height={1123}>
          <PdfCertificate data={DATA_SA_JAM} resultMode="mixed" />
        </DCArtboard>
        <DCArtboard id="self-viol" label="08 — 잼류 · 위반 1 + 주의 2" width={794} height={1123}>
          <PdfCertificate data={DATA_SA_JAM} resultMode="violation" />
        </DCArtboard>
        <DCArtboard id="self-vit" label="09 — 즉판가공업 · 주의 2건 (건강식품)" width={794} height={1123}>
          <PdfCertificate data={DATA_B_VIT} resultMode="mixed" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
