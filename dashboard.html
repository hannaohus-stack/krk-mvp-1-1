:root {
  --color-bg-light: #F0F4F8;
  --color-bg-base: #E3EDF7;
  --color-accent-glow: #B8D4FF;
  --color-text-dark: #1A2B4C;
  --color-text-light: #4A5F7F;
  --color-text-lighter: #7A8FA3;
  --color-success: #4CAF50;
  --color-warning: #FF9800;
  --color-error: #F44336;
  --font-primary: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --shadow-sm: 0 6px 24px rgba(31, 38, 135, 0.05);
  --shadow-md: 0 8px 32px rgba(31, 38, 135, 0.07);
  --shadow-lg: 0 12px 40px rgba(31, 38, 135, 0.12);
  --transition: 0.3s ease;
}

body {
  font-family: var(--font-primary);
  background-color: var(--color-bg-light);
  background-image:
    radial-gradient(circle at 0% 0%, hsla(210, 50%, 93%, 1) 0, transparent 50%),
    radial-gradient(circle at 100% 0%, hsla(212, 60%, 88%, 1) 0, transparent 50%),
    radial-gradient(circle at 50% 100%, hsla(214, 40%, 95%, 1) 0, transparent 50%);
  min-height: 100vh;
  color: var(--color-text-light);
}

/* ===== HEADER ===== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(240, 244, 248, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(184, 212, 255, 0.3);
  box-shadow: var(--shadow-sm);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--color-text-dark);
  text-decoration: none;
  letter-spacing: -0.5px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.plan-badge {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 700;
  background: rgba(184, 212, 255, 0.3);
  color: var(--color-text-dark);
  border: 1px solid rgba(184, 212, 255, 0.4);
}

.plan-badge.premium {
  background: rgba(26, 43, 76, 0.1);
  color: var(--color-text-dark);
  border-color: rgba(26, 43, 76, 0.2);
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.7));
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
}

/* ===== MAIN ===== */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 40px 80px;
}

/* ===== GREETING ===== */
.greeting {
  margin-bottom: 36px;
}

.greeting h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--color-text-dark);
  margin-bottom: 6px;
}

.greeting p {
  color: var(--color-text-light);
  font-size: 0.95rem;
  margin-bottom: 0;
}

.greeting .date-text {
  font-size: 0.82rem;
  color: var(--color-text-lighter);
  margin-top: 4px;
}

/* ===== STATS GRID ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: var(--radius-xl);
  padding: 24px;
  box-shadow: var(--shadow-md);
  transition: transform var(--transition), box-shadow var(--transition);
}

.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}

.stat-card .stat-icon {
  font-size: 1.6rem;
  margin-bottom: 12px;
}

.stat-card .stat-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--color-text-lighter);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}

.stat-card .stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-text-dark);
  line-height: 1;
}

.stat-card .stat-sub {
  font-size: 0.78rem;
  color: var(--color-text-lighter);
  margin-top: 4px;
}

/* 플랜 카드 */
.stat-card.plan-card {
  background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.75));
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.stat-card.plan-card .stat-label { color: rgba(255,255,255,0.6); }
.stat-card.plan-card .stat-value { color: white; font-size: 1.3rem; }
.stat-card.plan-card .stat-sub { color: rgba(255,255,255,0.55); }

.plan-features {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.plan-feature {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.75);
  display: flex;
  align-items: center;
  gap: 6px;
}

.plan-feature::before {
  content: '✓';
  color: var(--color-accent-glow);
  font-weight: 700;
}

/* 사용량 바 */
.usage-bar-wrap { margin-top: 12px; }

.usage-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--color-text-lighter);
  margin-bottom: 5px;
}

.usage-bar {
  height: 5px;
  background: rgba(184, 212, 255, 0.3);
  border-radius: 999px;
  overflow: hidden;
}

.usage-bar-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #B8D4FF, #1A2B4C);
  transition: width 0.6s ease;
}

.usage-bar-fill.low { background: linear-gradient(90deg, #FF9800, #F44336); }

/* ===== QUICK ACTIONS ===== */
.quick-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 36px;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 24px;
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: var(--radius-lg);
  cursor: pointer;
  text-decoration: none;
  color: var(--color-text-dark);
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}

.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(184, 212, 255, 0.5);
  background: rgba(255, 255, 255, 0.65);
}

.action-icon {
  width: 46px;
  height: 46px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
  background: rgba(184, 212, 255, 0.25);
  border: 1px solid rgba(184, 212, 255, 0.3);
}

.action-text h3 {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--color-text-dark);
  margin-bottom: 2px;
}

.action-text p {
  font-size: 0.78rem;
  color: var(--color-text-lighter);
  margin: 0;
}

.action-arrow {
  margin-left: auto;
  color: var(--color-text-lighter);
  font-size: 1.2rem;
}

/* ===== WORKS SECTION ===== */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.section-header h2 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--color-text-dark);
}

.total-count {
  font-size: 0.82rem;
  color: var(--color-text-lighter);
}

/* Filter Tabs */
.filter-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.filter-tab {
  padding: 7px 16px;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid rgba(184, 212, 255, 0.4);
  background: rgba(255, 255, 255, 0.4);
  color: var(--color-text-light);
  font-family: var(--font-primary);
  transition: all 0.15s;
}

.filter-tab:hover {
  background: rgba(255, 255, 255, 0.6);
}

.filter-tab.active {
  background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.75));
  color: white;
  border-color: transparent;
}

/* Work Items */
.works-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.work-item {
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}

.work-item:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
  border-color: rgba(184, 212, 255, 0.5);
}

.work-type-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  background: rgba(184, 212, 255, 0.2);
  border: 1px solid rgba(184, 212, 255, 0.3);
}

.work-info { flex: 1; min-width: 0; }

.work-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-text-dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.work-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--color-text-lighter);
}

/* Status Badges */
.status-badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}

.status-badge.safe {
  background: rgba(76, 175, 80, 0.15);
  color: #2E7D32;
  border: 1px solid rgba(76, 175, 80, 0.25);
}

.status-badge.warning {
  background: rgba(255, 152, 0, 0.15);
  color: #E65100;
  border: 1px solid rgba(255, 152, 0, 0.25);
}

.status-badge.risk, .status-badge.danger {
  background: rgba(244, 67, 54, 0.12);
  color: #C62828;
  border: 1px solid rgba(244, 67, 54, 0.2);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(15px);
  border: 1.5px dashed rgba(184, 212, 255, 0.5);
  border-radius: var(--radius-xl);
}

.empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }

.empty-state h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--color-text-dark);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 0.85rem;
  color: var(--color-text-lighter);
  margin-bottom: 20px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 24px;
  background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.75));
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  font-family: var(--font-primary);
  backdrop-filter: blur(10px);
  transition: all var(--transition);
}

.btn-primary:hover {
  background: linear-gradient(135deg, #1A2B4C, rgba(26, 43, 76, 0.9));
  box-shadow: 0 8px 20px rgba(26, 43, 76, 0.2);
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26, 43, 76, 0.3);
  backdrop-filter: blur(8px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: var(--radius-xl);
  padding: 32px;
  width: 90%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}

.modal-close {
  float: right;
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  color: var(--color-text-lighter);
  margin-top: -4px;
}

.modal-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--color-text-dark);
  margin-bottom: 20px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(184, 212, 255, 0.2);
  font-size: 0.88rem;
}

.detail-row:last-child { border-bottom: none; }
.detail-row .label { color: var(--color-text-lighter); }
.detail-row .value { font-weight: 600; color: var(--color-text-dark); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header-inner { padding: 0 20px; }
  main { padding: 24px 20px 60px; }
  .stats-grid { grid-template-columns: 1fr; }
  .quick-actions { grid-template-columns: 1fr; }
  .greeting h1 { font-size: 1.4rem; }
}
