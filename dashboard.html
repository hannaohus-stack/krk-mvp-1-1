<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KRK - 라벨부터 신고까지, 한 곳에서">
  <title>KRK - 대시보드</title>
  
  <!-- Pretendard 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #F0F4F8 0%, #E3EDF7 100%);
      min-height: 100vh;
      padding: 24px;
      color: #1A2B4C;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ==================== 헤더 ==================== */
    .header {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(184, 212, 255, 0.2);
      border-radius: 12px;
    }

    .user-info h2 {
      font-size: 16px;
      margin-bottom: 4px;
      color: #1A2B4C;
    }

    .user-info p {
      font-size: 12px;
      color: #4A5F7F;
      margin: 0;
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .logout-btn {
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid rgba(26, 43, 76, 0.2);
      background: transparent;
      color: #1A2B4C;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: rgba(26, 43, 76, 0.05);
    }

    /* ==================== 플랜 섹션 ==================== */
    .plan-section {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .plan-grid {
      display: flex;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .plan-item {
      flex: 1;
      min-width: 200px;
    }

    .plan-label {
      font-size: 12px;
      color: #7A8FA3;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    .plan-value {
      font-size: 24px;
      color: #1A2B4C;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .plan-badge {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: 8px;
      color: #4CAF50;
      font-size: 12px;
      font-weight: 600;
    }

    .plan-badge.free {
      background: rgba(184, 212, 255, 0.2);
      border-color: rgba(184, 212, 255, 0.3);
      color: #B8D4FF;
    }

    .plan-action {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(26, 43, 76, 0.9), rgba(26, 43, 76, 0.8));
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      flex: 1;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(26, 43, 76, 1), rgba(26, 43, 76, 0.9));
      box-shadow: 0 8px 20px rgba(26, 43, 76, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.4);
      color: #1A2B4C;
      border: 1px solid rgba(26, 43, 76, 0.15);
      flex: 1;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    /* ==================== 사용량 섹션 ==================== */
    .usage-section {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .usage-title {
      font-size: 16px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 24px;
    }

    .usage-grid {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .usage-card {
      background: rgba(184, 212, 255, 0.1);
      border: 1px solid rgba(184, 212, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      flex: 1;
      min-width: 200px;
    }

    .usage-label {
      font-size: 14px;
      color: #4A5F7F;
      margin-bottom: 12px;
    }

    .usage-bar {
      width: 100%;
      height: 8px;
      background: rgba(26, 43, 76, 0.1);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .usage-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #45a049);
      border-radius: 999px;
      transition: width 0.3s;
    }

    .usage-count {
      font-size: 14px;
      color: #4A5F7F;
    }

    .usage-unlimited {
      color: #4CAF50;
      font-weight: 600;
    }

    /* ==================== 액션 버튼 ==================== */
    .action-grid {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .action-button {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
      flex: 1;
      min-width: 200px;
      text-decoration: none;
      color: inherit;
    }

    .action-button:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(31, 38, 135, 0.15);
    }

    .action-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .action-title {
      font-size: 16px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 8px;
    }

    .action-desc {
      font-size: 12px;
      color: #4A5F7F;
    }

    /* ==================== 최근 작업 ==================== */
    .recent-section {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }

    .recent-title {
      font-size: 16px;
      font-weight: 700;
      color: #1A2B4C;
      margin-bottom: 24px;
    }

    .recent-list {
      list-style: none;
    }

    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid rgba(26, 43, 76, 0.05);
      transition: background 0.3s;
    }

    .recent-item:last-child {
      border-bottom: none;
    }

    .recent-item:hover {
      background: rgba(184, 212, 255, 0.05);
    }

    .recent-info {
      flex: 1;
    }

    .recent-name {
      font-size: 14px;
      font-weight: 600;
      color: #1A2B4C;
      margin-bottom: 4px;
    }

    .recent-date {
      font-size: 12px;
      color: #7A8FA3;
    }

    .recent-view {
      padding: 6px 12px;
      background: rgba(184, 212, 255, 0.2);
      border: 1px solid rgba(184, 212, 255, 0.3);
      border-radius: 8px;
      color: #B8D4FF;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .recent-view:hover {
      background: rgba(184, 212, 255, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #4A5F7F;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .header-right {
        width: 100%;
        justify-content: center;
      }

      .plan-section,
      .usage-section,
      .recent-section {
        padding: 24px;
      }

      .usage-grid {
        flex-direction: column;
      }

      .action-grid {
        flex-direction: column;
      }

      .recent-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .recent-view {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <div class="header-left">
        <div class="logo-icon">🍳</div>
        <div class="user-info">
          <h2 id="userName">로딩 중...</h2>
          <p id="userCompany">회사명</p>
        </div>
      </div>
      <div class="header-right">
        <button class="logout-btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <!-- 플랜 정보 -->
    <div class="plan-section">
      <div class="plan-grid">
        <div class="plan-item">
          <span class="plan-label">현재 플랜</span>
          <div style="display: flex; align-items: center; gap: 12px;">
            <span class="plan-value" id="planName">FREE</span>
            <span class="plan-badge free" id="planStatus">무료</span>
          </div>
        </div>
        <div class="plan-item">
          <span class="plan-label">다음 결제일</span>
          <span class="plan-value" id="nextBillingDate">-</span>
        </div>
      </div>
      <div class="plan-action">
        <button class="btn btn-primary" onclick="goToUpgrade()" id="upgradeBtn" style="display: none;">업그레이드</button>
        <button class="btn btn-secondary" onclick="goToSubscription()">구독 관리</button>
      </div>
    </div>

    <!-- 사용량 -->
    <div class="usage-section">
      <h3 class="usage-title">📊 이번 달 사용량</h3>
      <div class="usage-grid">
        <div class="usage-card">
          <div class="usage-label">라벨 생성</div>
          <div class="usage-bar">
            <div class="usage-bar-fill" id="labelUsageBar" style="width: 33%;"></div>
          </div>
          <div class="usage-count" id="labelUsageText">1 / 3</div>
        </div>
        <div class="usage-card">
          <div class="usage-label">라벨 진단</div>
          <div class="usage-bar">
            <div class="usage-bar-fill" id="diagnoseUsageBar" style="width: 0%;"></div>
          </div>
          <div class="usage-count" id="diagnoseUsageText">0 / 3</div>
        </div>
      </div>
    </div>

    <!-- 액션 버튼 -->
    <div class="action-grid">
      <a href="label-create.html" class="action-button">
        <div class="action-icon">🏷️</div>
        <div class="action-title">라벨 생성</div>
        <div class="action-desc">제품 정보를 입력하면 라벨을 자동 생성합니다</div>
      </a>
      <a href="label-diagnose.html" class="action-button">
        <div class="action-icon">🔍</div>
        <div class="action-title">라벨 진단</div>
        <div class="action-desc">기존 라벨의 문제점을 AI가 분석해줍니다</div>
      </a>
    </div>

    <!-- 최근 작업 -->
    <div class="recent-section">
      <h3 class="recent-title">📋 최근 작업</h3>
      <ul class="recent-list" id="recentList">
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <p>아직 작업 이력이 없습니다. 첫 번째 라벨을 만들어보세요!</p>
        </div>
      </ul>
    </div>
  </div>

  <script>
    // 페이지 로드 전에 데이터 초기화
    const testMode = new URLSearchParams(window.location.search).get('test') === '1';
    let user = null;

    if (testMode) {
      // 테스트 모드: 항상 샘플 데이터 사용
      user = {
        id: 'test_user',
        email: 'test@example.com',
        company: '테스트 회사',
        isPremium: false,
        usageQuota: 3,
        usageRemaining: 1
      };
    } else {
      // 실제 모드: localStorage에서 읽기
      const userData = localStorage.getItem('krk_user');
      if (userData) {
        user = JSON.parse(userData);
      }
    }

    // 사용자 정보가 없으면 기본값
    if (!user) {
      user = {
        id: 'default_user',
        email: 'user@example.com',
        company: '회사명',
        isPremium: false,
        usageQuota: 3,
        usageRemaining: 3
      };
    }

    // 페이지 로드 후 UI 업데이트
    window.addEventListener('load', () => {
      // 사용자명 설정
      document.getElementById('userName').textContent = user.email.split('@')[0];
      document.getElementById('userCompany').textContent = user.company;

      // 플랜 정보 설정
      const planName = user.isPremium ? 'STANDARD' : 'FREE';
      document.getElementById('planName').textContent = planName;
      
      const planBadge = document.getElementById('planStatus');
      const upgradeBtn = document.getElementById('upgradeBtn');
      const nextBillingEl = document.getElementById('nextBillingDate');
      const labelUsageText = document.getElementById('labelUsageText');
      const diagnoseUsageText = document.getElementById('diagnoseUsageText');
      const labelUsageBar = document.getElementById('labelUsageBar');

      if (user.isPremium) {
        // 프리미엄 사용자
        planBadge.textContent = '활성';
        planBadge.classList.remove('free');
        upgradeBtn.style.display = 'none';
        
        const nextBilling = new Date();
        nextBilling.setMonth(nextBilling.getMonth() + 1);
        nextBillingEl.textContent = nextBilling.toLocaleDateString('ko-KR');
        
        labelUsageText.innerHTML = '<span class="usage-unlimited">무제한</span>';
        diagnoseUsageText.innerHTML = '<span class="usage-unlimited">무제한</span>';
        labelUsageBar.style.width = '100%';
      } else {
        // 무료 사용자
        planBadge.textContent = '무료';
        planBadge.classList.add('free');
        upgradeBtn.style.display = 'block';
        nextBillingEl.textContent = '-';
        
        const usageRemaining = user.usageRemaining || 3;
        const usageUsed = user.usageQuota - usageRemaining;
        const usagePercent = (usageUsed / user.usageQuota) * 100;
        
        labelUsageBar.style.width = usagePercent + '%';
        labelUsageText.textContent = usageUsed + ' / ' + user.usageQuota;
      }

      // 최근 작업 로드
      const recentWorks = localStorage.getItem('krk_recent_works');
      const recentList = document.getElementById('recentList');
      
      if (recentWorks) {
        try {
          const works = JSON.parse(recentWorks);
          recentList.innerHTML = works.map(work => `
            <li class="recent-item">
              <div class="recent-info">
                <div class="recent-name">${work.name}</div>
                <div class="recent-date">${work.date}</div>
              </div>

            </li>
          `).join('');
        } catch (e) {
          console.log('최근 작업 로드 실패');
        }
      }
    });

    function logout() {
      if (confirm('로그아웃 하시겠습니까?')) {
        localStorage.removeItem('krk_session');
        window.location.href = 'login.html';
      }
    }

    function goToUpgrade() {
      window.location.href = 'paywall.html';
    }

    function goToSubscription() {
      window.location.href = 'subscription.html';
    }
  </script>
</body>
</html>
