<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRK - 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary-blue: #0052FF;
      --accent-green: #00E676;
      --danger-red: #FF4444;
      --warning-yellow: #FFB800;
      --text-dark: #1A1A1A;
      --text-light: #666666;
      --bg-light: #F5F5F5;
      --white: #FFFFFF;
      --border: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      padding: 16px 0;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid rgba(0,82,255,0.1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .header-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary-blue);
      cursor: pointer;
      text-decoration: none;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .plan-badge {
      padding: 6px 14px;
      background: rgba(0,230,118,0.1);
      border-radius: 6px;
      font-size: 0.8rem;
      color: #00AA55;
      font-weight: 700;
    }
    .plan-badge.premium {
      background: rgba(0,82,255,0.1);
      color: var(--primary-blue);
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary-blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* ===== MAIN ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    /* ===== GREETING ===== */
    .greeting {
      margin-bottom: 40px;
    }
    .greeting h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .greeting p {
      color: var(--text-light);
      font-size: 0.95rem;
    }
    .greeting .date-text {
      font-size: 0.85rem;
      color: #999;
      margin-top: 4px;
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .stat-card .stat-icon {
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--text-light);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1;
    }
    .stat-card .stat-sub {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 4px;
    }
    .stat-card.plan-card {
      background: linear-gradient(135deg, #0052FF 0%, #0040CC 100%);
      color: white;
    }
    .stat-card.plan-card .stat-label { color: rgba(255,255,255,0.7); }
    .stat-card.plan-card .stat-value { color: white; font-size: 1.3rem; }
    .stat-card.plan-card .stat-sub { color: rgba(255,255,255,0.65); }
    .stat-card.plan-card .plan-features {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-card.plan-card .plan-feature {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-card.plan-card .plan-feature::before {
      content: '✓';
      color: var(--accent-green);
      font-weight: 700;
    }

    .usage-bar-wrap {
      margin-top: 10px;
    }
    .usage-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .usage-bar {
      height: 6px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }
    .usage-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary-blue);
      transition: width 0.5s ease;
    }
    .usage-bar-fill.green { background: var(--accent-green); }
    .usage-bar-fill.red { background: var(--danger-red); }

    /* ===== QUICK ACTIONS ===== */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 40px;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-dark);
      transition: all 0.2s;
    }
    .action-btn:hover {
      border-color: var(--primary-blue);
      background: rgba(0,82,255,0.02);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,82,255,0.1);
    }
    .action-btn .action-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .action-btn .action-icon.blue { background: rgba(0,82,255,0.1); }
    .action-btn .action-icon.green { background: rgba(0,230,118,0.1); }
    .action-btn .action-text h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .action-btn .action-text p {
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .action-btn .action-arrow {
      margin-left: auto;
      color: #ccc;
      font-size: 1.1rem;
    }

    /* ===== WORKS SECTION ===== */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
    }
    .section-header .total-count {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-tab {
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-light);
      transition: all 0.15s;
    }
    .filter-tab.active {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
    }

    /* Works List */
    .works-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .work-item {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .work-item:hover {
      border-color: rgba(0,82,255,0.2);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .work-type-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .work-type-icon.creator { background: rgba(0,82,255,0.1); }
    .work-type-icon.checker { background: rgba(0,230,118,0.1); }

    .work-info { flex: 1; min-width: 0; }
    .work-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .work-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .work-type-label {
      font-size: 0.75rem;
      color: var(--text-light);
    }
    .work-date {
      font-size: 0.75rem;
      color: #bbb;
    }

    /* Status Badges */
    .status-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .status-badge.safe {
      background: rgba(0,230,118,0.12);
      color: #00A040;
    }
    .status-badge.warning {
      background: rgba(255,184,0,0.12);
      color: #CC8000;
    }
    .status-badge.risk {
      background: rgba(255,68,68,0.1);
      color: var(--danger-red);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 16px;
      border: 1.5px dashed var(--border);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 20px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: var(--primary-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.88; }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 90%;
      max-width: 520px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal-close {
      float: right;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text-light);
      margin-top: -4px;
    }
    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.9rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .label { color: var(--text-light); }
    .detail-row .value { font-weight: 600; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .header-content { padding: 0 20px; }
      main { padding: 24px 20px 60px; }
      .stats-grid { grid-template-columns: 1fr; }
      .quick-actions { grid-template-columns: 1fr; }
      .greeting h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-content">
      <a class="logo" href="../index.html">KRK</a>
      <div class="header-right">
        <span class="plan-badge" id="planBadge">Free</span>
        <div class="user-avatar" id="userAvatar">K</div>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main>

    <!-- Greeting -->
    <div class="greeting">
      <h1 id="greetingText">안녕하세요 👋</h1>
      <p>오늘도 안전한 라벨 만들기를 시작해볼까요?</p>
      <p class="date-text" id="todayDate"></p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">

      <!-- Plan Card -->
      <div class="stat-card plan-card">
        <div class="stat-icon">💎</div>
        <div class="stat-label">현재 플랜</div>
        <div class="stat-value" id="planName">Free</div>
        <div class="stat-sub" id="planDesc">월 0원</div>
        <div class="plan-features" id="planFeatures"></div>
      </div>

      <!-- Label Usage -->
      <div class="stat-card">
        <div class="stat-icon">🏷️</div>
        <div class="stat-label">라벨 생성</div>
        <div class="stat-value" id="labelCount">0</div>
        <div class="stat-sub" id="labelSub">이번 달 남은 횟수</div>
        <div class="usage-bar-wrap" id="labelBar"></div>
      </div>

      <!-- Checker Usage -->
      <div class="stat-card">
        <div class="stat-icon">🔍</div>
        <div class="stat-label">라벨 분석</div>
        <div class="stat-value" id="checkerCount">0</div>
        <div class="stat-sub" id="checkerSub">이번 달 남은 횟수</div>
        <div class="usage-bar-wrap" id="checkerBar"></div>
      </div>

    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <a class="action-btn" href="../creator/creator.html">
        <div class="action-icon blue">✏️</div>
        <div class="action-text">
          <h3>라벨 생성하기</h3>
          <p>배합비 입력 → 한글표시사항 자동 생성</p>
        </div>
        <div class="action-arrow">›</div>
      </a>
      <a class="action-btn" href="../checker/checker.html">
        <div class="action-icon green">📋</div>
        <div class="action-text">
          <h3>라벨 분석하기</h3>
          <p>라벨 시안 업로드 → 리스크 포인트 검출</p>
        </div>
        <div class="action-arrow">›</div>
      </a>
    </div>

    <!-- Works Section -->
    <div class="section-header">
      <h2>최근 작업</h2>
      <span class="total-count" id="totalCount">전체 0건</span>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterWorks('all')">전체</button>
      <button class="filter-tab" onclick="filterWorks('creator')">라벨 생성</button>
      <button class="filter-tab" onclick="filterWorks('checker')">라벨 분석</button>
    </div>

    <div class="works-list" id="worksList"></div>

  </main>

  <!-- ===== WORK DETAIL MODAL ===== -->
  <div class="modal-overlay" id="workModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title" id="modalTitle">작업 상세</div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
