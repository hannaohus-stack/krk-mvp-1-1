<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRK - 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F0F4F8;
  --navy: #1A2B4C;
  --navy-light: #4A5F7F;
  --muted: #7A8FA3;
  --accent: #B8D4FF;
  --success: #4CAF50;
  --warning: #FF9800;
  --error: #F44336;
  --font: 'Pretendard', -apple-system, sans-serif;
  --r-sm: 12px; --r-md: 16px; --r-lg: 20px; --r-xl: 24px;
  --sh-sm: 0 4px 16px rgba(31,38,135,0.05);
  --sh-md: 0 8px 32px rgba(31,38,135,0.08);
  --sh-lg: 0 12px 40px rgba(31,38,135,0.13);
  --ease: 0.25s ease;
}

body {
  font-family: var(--font);
  background: var(--bg);
  background-image:
    radial-gradient(circle at 0% 0%, hsla(210,50%,93%,1) 0, transparent 50%),
    radial-gradient(circle at 100% 0%, hsla(212,60%,88%,1) 0, transparent 50%),
    radial-gradient(circle at 50% 100%, hsla(214,40%,95%,1) 0, transparent 50%);
  min-height: 100vh;
  color: var(--navy-light);
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(240,244,248,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(184,212,255,0.3);
  box-shadow: var(--sh-sm);
}
.header-inner {
  max-width: 680px; margin: 0 auto;
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-size: 1.2rem; font-weight: 700;
  color: var(--navy); text-decoration: none; letter-spacing: -0.5px;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.plan-badge {
  padding: 4px 11px; border-radius: 999px;
  font-size: 0.73rem; font-weight: 700;
  background: rgba(184,212,255,0.3);
  color: var(--navy);
  border: 1px solid rgba(184,212,255,0.45);
}
.plan-badge.premium {
  background: rgba(26,43,76,0.09);
  border-color: rgba(26,43,76,0.18);
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #1A2B4C, rgba(26,43,76,0.65));
  color: white; display: flex; align-items: center;
  justify-content: center; font-weight: 700; font-size: 0.8rem;
}

/* ── MAIN ── */
main {
  max-width: 680px; margin: 0 auto;
  padding: 36px 24px 80px;
  display: flex; flex-direction: column; gap: 28px;
}

/* ── 1. GREETING ── */
.greeting h1 {
  font-size: 1.55rem; font-weight: 700;
  color: var(--navy); margin-bottom: 4px;
}
.greeting p { font-size: 0.9rem; color: var(--navy-light); margin: 0; }
.greeting .date { font-size: 0.76rem; color: var(--muted); margin-top: 3px; }

/* ── 2. ACTIONS ── */
.section-label {
  font-size: 0.7rem; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.9px;
  margin-bottom: 10px;
}
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.action-card {
  display: flex; flex-direction: row;
  align-items: center; gap: 14px;
  padding: 18px 20px;
  border-radius: var(--r-lg);
  box-shadow: var(--sh-md);
  text-decoration: none;
  transition: all var(--ease);
}
/* 라벨 생성 — 네이비 */
.action-card.creator {
  background: linear-gradient(135deg, #1A2B4C, #2E4270);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
}
.action-card.creator:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(26,43,76,0.35);
}
/* 라벨 분석 — 소프트 블루 */
.action-card.checker {
  background: linear-gradient(135deg, #3B6FD4, #5B8FEF);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
}
.action-card.checker:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(59,111,212,0.35);
}

.action-icon {
  width: 44px; height: 44px; border-radius: var(--r-sm);
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center;
  justify-content: center; font-size: 1.3rem;
  flex-shrink: 0;
}
.action-text { flex: 1; min-width: 0; }
.action-card h3 {
  font-size: 0.92rem; font-weight: 700;
  color: white; margin-bottom: 2px;
}
.action-card p {
  font-size: 0.73rem; color: rgba(255,255,255,0.7); margin: 0;
}

/* ── 3. USAGE ── */
.usage-card {
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: var(--r-xl);
  padding: 22px 24px;
  box-shadow: var(--sh-md);
}
.usage-head {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 20px;
}
.usage-head .title {
  font-size: 0.86rem; font-weight: 700; color: var(--navy);
}
.plan-tag {
  font-size: 0.7rem; font-weight: 700;
  padding: 4px 10px; border-radius: 999px;
  background: rgba(26,43,76,0.07);
  color: var(--navy);
  border: 1px solid rgba(26,43,76,0.1);
}
.usage-row {
  display: flex; align-items: center; gap: 13px;
  margin-bottom: 14px;
}
.usage-row:last-child { margin-bottom: 0; }
.u-icon { font-size: 1rem; flex-shrink: 0; }
.u-info { flex: 1; }
.u-top {
  display: flex; align-items: baseline;
  justify-content: space-between; margin-bottom: 6px;
}
.u-name { font-size: 0.8rem; font-weight: 600; color: var(--navy); }
.u-count { font-size: 0.82rem; font-weight: 700; color: var(--navy); }
.u-count .denom { font-weight: 400; color: var(--muted); }
.bar {
  height: 5px; background: rgba(184,212,255,0.25);
  border-radius: 999px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), var(--navy));
  transition: width 0.6s ease;
}
.bar-fill.empty { background: linear-gradient(90deg, #FF9800, #F44336); }
.bar-fill.unlimited { background: linear-gradient(90deg, #4CAF50, #2E7D32); width: 100% !important; }

/* ── 4. RECENT WORKS ── */
.works-head {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 10px;
}
.works-head .title { font-size: 0.86rem; font-weight: 700; color: var(--navy); }
.works-count { font-size: 0.76rem; color: var(--muted); }

.filter-tabs { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-tab {
  padding: 6px 13px; border-radius: 999px;
  font-size: 0.74rem; font-weight: 600;
  cursor: pointer; font-family: var(--font);
  border: 1px solid rgba(184,212,255,0.4);
  background: rgba(255,255,255,0.42);
  color: var(--navy-light);
  transition: all 0.15s;
}
.filter-tab:hover { background: rgba(255,255,255,0.65); }
.filter-tab.active {
  background: linear-gradient(135deg, rgba(26,43,76,0.9), rgba(26,43,76,0.7));
  color: white; border-color: transparent;
}

.works-list { display: flex; flex-direction: column; gap: 8px; }

/* Work Item */
.work-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: var(--r-md);
  box-shadow: var(--sh-sm);
  cursor: pointer;
  transition: all var(--ease);
}
.work-item:hover {
  transform: translateY(-1px);
  box-shadow: var(--sh-md);
  border-color: rgba(184,212,255,0.5);
  background: rgba(255,255,255,0.65);
}
.w-icon {
  width: 38px; height: 38px; flex-shrink: 0;
  border-radius: 10px;
  background: rgba(184,212,255,0.18);
  border: 1px solid rgba(184,212,255,0.28);
  display: flex; align-items: center;
  justify-content: center; font-size: 0.95rem;
}
.w-body { flex: 1; min-width: 0; }
.w-title {
  font-size: 0.88rem; font-weight: 700;
  color: var(--navy);
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; margin-bottom: 3px;
}
.w-meta { font-size: 0.72rem; color: var(--muted); }
.w-right {
  display: flex; align-items: center;
  gap: 8px; flex-shrink: 0;
}

/* Status badges */
.badge {
  padding: 3px 9px; border-radius: 999px;
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.3px;
}
.badge-safe {
  background: rgba(76,175,80,0.13); color: #2E7D32;
  border: 1px solid rgba(76,175,80,0.22);
}
.badge-warning {
  background: rgba(255,152,0,0.13); color: #E65100;
  border: 1px solid rgba(255,152,0,0.22);
}
.badge-risk, .badge-danger {
  background: rgba(244,67,54,0.11); color: #C62828;
  border: 1px solid rgba(244,67,54,0.18);
}
.w-arrow { color: var(--muted); font-size: 1rem; }

/* Empty state */
.empty-state {
  text-align: center; padding: 50px 20px;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(12px);
  border: 1.5px dashed rgba(184,212,255,0.4);
  border-radius: var(--r-xl);
}
.empty-state .e-icon { font-size: 2.3rem; margin-bottom: 12px; }
.empty-state h3 {
  font-size: 0.9rem; font-weight: 700;
  color: var(--navy); margin-bottom: 6px;
}
.empty-state p {
  font-size: 0.78rem; color: var(--muted); margin-bottom: 18px;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 22px;
  background: linear-gradient(135deg, rgba(26,43,76,0.9), rgba(26,43,76,0.7));
  color: white; border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--r-sm);
  font-size: 0.84rem; font-weight: 600;
  text-decoration: none; font-family: var(--font);
  cursor: pointer; transition: all var(--ease);
}
.btn-primary:hover { box-shadow: 0 6px 18px rgba(26,43,76,0.2); }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,43,76,0.28);
  backdrop-filter: blur(8px); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: var(--r-xl);
  padding: 28px; width: 90%; max-width: 420px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: var(--sh-lg);
}
.modal-close {
  float: right; background: none; border: none;
  font-size: 1.1rem; cursor: pointer; color: var(--muted);
}
.modal-title {
  font-size: 1rem; font-weight: 700;
  color: var(--navy); margin-bottom: 18px;
}
.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid rgba(184,212,255,0.18);
  font-size: 0.84rem;
}
.detail-row:last-child { border-bottom: none; }
.detail-row .lbl { color: var(--muted); }
.detail-row .val { font-weight: 600; color: var(--navy); }

@media (max-width: 480px) {
  .header-inner { padding: 0 16px; }
  main { padding: 24px 16px 60px; }
  .action-grid { grid-template-columns: 1fr; }
}
